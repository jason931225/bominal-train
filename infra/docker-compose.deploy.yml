services:
  postgres:
    image: postgres:16-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/prod/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    image: ${BOMINAL_API_IMAGE:-ghcr.io/jason931225/bominal-api}:${BOMINAL_IMAGE_TAG:-latest}
    container_name: bominal-api
    working_dir: /app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ./env/prod/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    image: ${BOMINAL_API_IMAGE:-ghcr.io/jason931225/bominal-api}:${BOMINAL_IMAGE_TAG:-latest}
    container_name: bominal-worker
    working_dir: /app
    command: >
      sh -c "arq app.worker.WorkerSettings"
    env_file:
      - ./env/prod/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ${BOMINAL_WEB_IMAGE:-ghcr.io/jason931225/bominal-web}:${BOMINAL_IMAGE_TAG:-latest}
    container_name: bominal-web
    env_file:
      - ./env/prod/web.env
    depends_on:
      - api
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: bominal-caddy
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
