services:
  postgres:
    image: postgres:16-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/dev/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.19
    container_name: bominal-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ../api
    container_name: bominal-api
    working_dir: /app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./env/dev/api.env
    volumes:
      - ../api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../api
    container_name: bominal-worker
    working_dir: /app
    command: >
      sh -c "arq app.worker_train.WorkerTrainSettings"
    env_file:
      - ./env/dev/api.env
    volumes:
      - ../api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker-restaurant:
    build:
      context: ../api
    container_name: bominal-worker-restaurant
    working_dir: /app
    command: >
      sh -c "arq app.worker_restaurant.WorkerRestaurantSettings"
    env_file:
      - ./env/dev/api.env
    volumes:
      - ../api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  web:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    container_name: bominal-web
    working_dir: /app
    command: >
      sh -c "npm install && rm -rf .next && npm run dev -- -H 0.0.0.0 -p 3000"
    env_file:
      - ./env/dev/web.env
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  web_node_modules:
