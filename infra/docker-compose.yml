services:
  postgres:
    image: postgres:18-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/dev/postgres.env
    environment:
      # Keep legacy volume layout compatibility when upgrading to postgres:18+.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:8.6-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  egress-train:
    image: caddy:2.9-alpine
    container_name: bominal-egress-train
    volumes:
      - ./egress/train/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  egress-restaurant:
    image: caddy:2.9-alpine
    container_name: bominal-egress-restaurant
    volumes:
      - ./egress/restaurant/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.19
    container_name: bominal-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    image: rust:1.93-bookworm
    container_name: bominal-api
    working_dir: /workspace/rust
    command: >
      sh -c "cargo run -p bominal-rust-api"
    env_file:
      - ./env/dev/rust.env
    volumes:
      - ../rust:/workspace/rust
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    image: rust:1.93-bookworm
    container_name: bominal-worker
    working_dir: /workspace/rust
    command: >
      sh -c "cargo run -p bominal-rust-worker"
    env_file:
      - ./env/dev/rust.env
    volumes:
      - ../rust:/workspace/rust
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: rust:1.93-bookworm
    container_name: bominal-web
    working_dir: /workspace/rust
    command: >
      sh -c "cargo run -p bominal-rust-api"
    env_file:
      - ./env/dev/rust.env
    environment:
      APP_PORT: 3000
    volumes:
      - ../rust:/workspace/rust
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata_dev:
