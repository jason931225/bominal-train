services:
  postgres:
    image: postgres:16-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/prod/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../api
    container_name: bominal-api
    working_dir: /app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ./env/prod/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ../api
    container_name: bominal-worker
    working_dir: /app
    command: >
      sh -c "arq app.worker.WorkerSettings"
    env_file:
      - ./env/prod/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../web
    container_name: bominal-web
    working_dir: /app
    command: >
      sh -c "npm run build && npm run start -- -H 0.0.0.0 -p 3000"
    env_file:
      - ./env/prod/web.env
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:

