services:
  postgres:
    image: postgres:16-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/prod/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    container_name: bominal-api
    working_dir: /app
    command: >
      sh -c "python scripts/check_duplicate_display_names.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    container_name: bominal-worker
    working_dir: /app
    command: >
      sh -c "arq app.worker.WorkerSettings"
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile.prod
    container_name: bominal-web
    env_file:
      - ./env/prod/web.env
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    container_name: bominal-caddy
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - ./env/prod/caddy.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
