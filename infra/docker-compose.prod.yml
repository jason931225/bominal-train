services:
  postgres:
    image: postgres:16-alpine
    container_name: bominal-postgres
    env_file:
      - ./env/prod/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bominal -d bominal"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    # Pull pre-built image from Artifact Registry instead of building
    image: ${API_IMAGE:-us-central1-docker.pkg.dev/${GCP_PROJECT_ID:-bominal}/bominal/api:latest}
    container_name: bominal-api
    working_dir: /app
    command: >
      sh -c "python scripts/check_duplicate_display_names.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      # NOTE: use explicit IPv4 loopback instead of `localhost` to avoid
      # slow/blocked IPv6 resolution in minimal base images (can cause Docker
      # health checks to time out even though the service is healthy).
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  worker:
    # Pull pre-built image from Artifact Registry instead of building
    image: ${API_IMAGE:-us-central1-docker.pkg.dev/${GCP_PROJECT_ID:-bominal}/bominal/api:latest}
    container_name: bominal-worker
    working_dir: /app
    command: >
      sh -c "arq app.worker.WorkerSettings"
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; exit(0 if any('arq' in open(f'/proc/{p}/cmdline').read() for p in os.listdir('/proc') if p.isdigit() and os.path.exists(f'/proc/{p}/cmdline')) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    # Pull pre-built image from Artifact Registry instead of building
    image: ${WEB_IMAGE:-us-central1-docker.pkg.dev/${GCP_PROJECT_ID:-bominal}/bominal/web:latest}
    container_name: bominal-web
    env_file:
      - ./env/prod/web.env
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    container_name: bominal-caddy
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - ./env/prod/caddy.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
