services:
  redis:
    image: redis:8.6-alpine
    container_name: bominal-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  egress-train:
    image: caddy:2.9-alpine
    container_name: bominal-egress-train
    volumes:
      - ./egress/train/Caddyfile:/etc/caddy/Caddyfile:ro
    deploy:
      resources:
        limits:
          memory: 96M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-${GHCR_NAMESPACE:-ghcr.io/jason931225/bominal}/rust-api:latest}
    container_name: bominal-api
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 320M
    command: ["/usr/local/bin/bominal-rust-api"]
    depends_on:
      redis:
        condition: service_healthy
      egress-train:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-${GHCR_NAMESPACE:-ghcr.io/jason931225/bominal}/rust-worker:latest}
    container_name: bominal-worker
    env_file:
      - ./env/prod/api.env
    deploy:
      resources:
        limits:
          memory: 224M
    command: ["/usr/local/bin/bominal-rust-worker"]
    depends_on:
      redis:
        condition: service_healthy
      egress-train:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-${GHCR_NAMESPACE:-ghcr.io/jason931225/bominal}/rust-api:latest}
    container_name: bominal-web
    env_file:
      - ./env/prod/api.env
      - ./env/prod/web.env
    environment:
      APP_PORT: 3000
    deploy:
      resources:
        limits:
          memory: 200M
    command: ["/usr/local/bin/bominal-rust-api"]
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  web-canary:
    image: ${WEB_CANARY_IMAGE:-${WEB_IMAGE:-${GHCR_NAMESPACE:-ghcr.io/jason931225/bominal}/rust-api:latest}}
    container_name: bominal-web-canary
    env_file:
      - ./env/prod/api.env
      - ./env/prod/web.env
    environment:
      APP_PORT: 3000
    deploy:
      resources:
        limits:
          memory: 200M
    command: ["/usr/local/bin/bominal-rust-api"]
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    container_name: bominal-caddy
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    env_file:
      - ./env/prod/caddy.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/upstreams:/etc/caddy/upstreams:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
