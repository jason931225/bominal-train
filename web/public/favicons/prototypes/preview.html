<!doctype html>

  <meta charset="utf-8" />

  <title>Bominal Seasonal Icon Prototypes</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% -10%, #1d4ed8 0%, transparent 36%),
        radial-gradient(circle at 90% 0%, #7c3aed 0%, transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      line-height: 1.4;
      padding: 30px 16px 50px;
    }
    main { max-width: 1240px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 28px; color: var(--muted); }
    .style-section {
      margin: 24px 0 36px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    }
    h2 { margin: 0 0 12px; font-size: 1.3rem; }
    h3 { margin: 16px 0 10px; font-size: 1rem; color: #cbd5e1; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .card {
      margin: 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.35);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .card img {
      width: 100%;
      max-width: 160px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    figcaption {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      text-transform: lowercase;
    }
  </style>
</head>
