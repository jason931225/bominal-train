name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
  

permissions:
  contents: read
  id-token: write

env:
  DEPLOY_PUBSUB_TOPIC: bominal-deploy-requests

  GCP_PROJECT_ID: bominal
  GCP_REGION: us-central1
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Publish deploy request (Pub/Sub)
        shell: bash
        run: |
          set -euo pipefail

          workflow_commit="${{ github.event.workflow_run.head_sha }}"
          default_commit="${{ github.sha }}"

          mode="latest"
          commit="${workflow_commit:-$default_commit}"

          echo "Deploy request:"
          echo "  mode:   $mode"
          echo "  commit: $commit"

          export DEPLOY_COMMIT="$commit"

          # Fail fast with a clear error if the topic isn't provisioned.
          gcloud pubsub topics describe "${{ env.DEPLOY_PUBSUB_TOPIC }}" --project="${{ env.GCP_PROJECT_ID }}" >/dev/null

          message="$(python3 - <<'PY'
          import json
          import os
          payload = {
              "app": "bominal",
              "action": "deploy",
              "mode": "latest",
              "commit": os.environ.get("DEPLOY_COMMIT", ""),
              "actor": os.environ.get("GITHUB_ACTOR", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"

          gcloud pubsub topics publish "${{ env.DEPLOY_PUBSUB_TOPIC }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --message="$message" \
            --attribute="app=bominal" \
            --attribute="mode=latest" \
            --attribute="commit=$commit" \
            --attribute="run_id=${{ github.run_id }}" \
            --attribute="run_attempt=${{ github.run_attempt }}"
