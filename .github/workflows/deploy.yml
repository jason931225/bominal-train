name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      commit:
        description: "Specific commit SHA to deploy (optional, defaults to latest)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write # REQUIRED for GCP OIDC

env:
  DEPLOY_INSTANCE: bominal-deploy
  DEPLOY_ZONE: us-central1-a
  DEPLOY_USER: bominal
  REPO_DIR: /opt/bominal/repo
  DEPLOY_SCRIPT: /opt/bominal/repo/infra/scripts/deploy-zero-downtime.sh

  GCP_PROJECT_ID: bominal
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    name: Deploy to GCE VM
    runs-on: ubuntu-latest

    # Prevent deploying failed builds
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit to deploy
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.commit }}" ]; then
            echo "sha=${{ github.event.inputs.commit }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

          echo "Deploying SHA: $(cat $GITHUB_OUTPUT | grep '^sha=' | cut -d= -f2)"

      # 🔐 Authenticate to GCP using OIDC (NO KEYS)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # 🚀 SSH into VM and deploy as local user 'bominal'
      - name: Deploy on VM (zero downtime)
        shell: bash
        run: |
          set -euo pipefail

          gcloud compute ssh \
            "${DEPLOY_INSTANCE}" \
            --project="${GCP_PROJECT_ID}" \
            --zone="${DEPLOY_ZONE}" \
            --command="
              set -euo pipefail

              echo 'Connected as:' \$(whoami)

              # Run the actual deploy under the stable local user (file ownership, docker perms, etc.)
              sudo -Hiu ${DEPLOY_USER} bash -lc '
                set -euo pipefail
                echo \"Running as: \$(whoami)\"

                cd \"${REPO_DIR}\"

                echo \"Fetching latest code...\"
                git fetch origin

                echo \"Checking out commit...\"
                git checkout \"${{ steps.commit.outputs.sha }}\"

                echo \"Running deploy script...\"
                chmod +x \"${DEPLOY_SCRIPT}\"
                \"${DEPLOY_SCRIPT}\"
              '
            "
