name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      commit:
        description: "Specific commit SHA to deploy (optional, defaults to latest)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  DEPLOY_INSTANCE: bominal-deploy
  DEPLOY_ZONE: us-central1-a
  REPO_DIR: /opt/bominal/repo
  DEPLOY_SCRIPT: /opt/bominal/repo/infra/scripts/deploy-zero-downtime.sh

  GCP_PROJECT_ID: bominal
  GCP_REGION: us-central1
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Generate ephemeral SSH key (RSA PEM)
        id: key
        shell: bash
        run: |
          ssh-keygen -t rsa -b 4096 -m PEM -N "" -f /tmp/gha_vm_key
          echo "private_key<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gha_vm_key >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: SSH and deploy
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ env.DEPLOY_INSTANCE }}
          zone: ${{ env.DEPLOY_ZONE }}
          ssh_private_key: ${{ steps.key.outputs.private_key }}
          command: |
            set -euo pipefail

            # OS Login is enabled; SSH login user is derived from IAM identity.
            # Run the deploy script as the app user (bominal) to match prod docs.
            echo "=== ssh identity (oslogin) ==="
            whoami
            id

            echo "=== sudo preflight ==="
            sudo -n true
            sudo -n -u bominal id

            cd "${{ env.REPO_DIR }}"

            if [[ -n "${{ github.event.inputs.commit }}" ]]; then
              sudo -n -u bominal env GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }} GCP_REGION=${{ env.GCP_REGION }} \
                bash "${{ env.DEPLOY_SCRIPT }}" "${{ github.event.inputs.commit }}"
            else
              sudo -n -u bominal env GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }} GCP_REGION=${{ env.GCP_REGION }} \
                bash "${{ env.DEPLOY_SCRIPT }}"
            fi
