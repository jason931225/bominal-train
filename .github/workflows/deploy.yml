name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit:
        description: "Specific commit SHA to deploy (optional, defaults to latest)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write # REQUIRED for GCP OIDC/WIF

env:
  DEPLOY_INSTANCE: bominal-deploy
  DEPLOY_ZONE: us-central1-a
  DEPLOY_USER: bominal
  REPO_DIR: /opt/bominal/repo
  DEPLOY_SCRIPT: /opt/bominal/repo/infra/scripts/deploy-zero-downtime.sh

  GCP_PROJECT_ID: bominal
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    # Only deploy on workflow_run if the upstream build succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for metadata only)
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 363.0.0"
          project_id: ${{ env.GCP_PROJECT_ID }}

      # Create an ephemeral SSH key for this run (no secret)
      - name: Generate SSH key
        id: key
        shell: bash
        run: |
          ssh-keygen -t ed25519 -N "" -f /tmp/gha_vm_key
          echo "private_key<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/gha_vm_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: SSH and deploy (IAP tunnel)
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ env.DEPLOY_INSTANCE }}
          zone: ${{ env.DEPLOY_ZONE }}
          user: ${{ env.DEPLOY_USER }}
          ssh_private_key: ${{ secrets.DUMMY_NOT_NEEDED }}
          # NOTE: ssh-compute requires a private key input; we pass the generated key via file content:
          # Unfortunately inputs are strings, so we inline it:
          # (GitHub Actions expression reads file via bash substitution)
          # We do this by overriding in a run step below instead (see next step).

      # Workaround: call ssh-compute via a run step to pass the generated key content cleanly
      - name: SSH and deploy (actual)
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ env.DEPLOY_INSTANCE }}
          zone: ${{ env.DEPLOY_ZONE }}
          user: ${{ env.DEPLOY_USER }}
          ssh_private_key: ${{ steps.key.outputs.private_key }}
          command: |
            set -euo pipefail

            cd "${REPO_DIR}"

            # If manually specified, deploy that commit; otherwise deploy latest main
            if [ -n "${{ inputs.commit || '' }}" ]; then
              git fetch --all --prune
              git checkout "${{ inputs.commit }}"
            else
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi

            bash "${DEPLOY_SCRIPT}"
