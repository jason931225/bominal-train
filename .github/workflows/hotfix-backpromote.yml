name: Hotfix Back-Promotion

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: hotfix-backpromote-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backpromote:
    name: Open Main -> Staging Back-Promotion PR
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create back-promotion PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourcePr = context.payload.pull_request;

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:main`,
              base: "staging",
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Back-promotion PR already exists: #${existing[0].number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: `backpromote: main -> staging (hotfix #${sourcePr.number})`,
              head: "main",
              base: "staging",
              body: [
                `Automated back-promotion after merged hotfix PR #${sourcePr.number}.`,
                "",
                "Follow-up after merge:",
                "1. Open `staging -> dev` back-promotion PR.",
                "2. Request `@copilot review` then `@codex review`.",
                "3. Merge via `/promote merge` once checks and conversations are clear.",
              ].join("\n"),
              maintainer_can_modify: true,
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: created.data.number,
              labels: ["type:ops", "area:ci-cd", "priority:p0", "promotion:auto"],
            });

            core.info(`Created back-promotion PR #${created.data.number}`);
