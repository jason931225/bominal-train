# Automated deployment workflow
# Triggers after successful image builds to deploy to production

name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      commit:
        description: 'Specific commit SHA to deploy (optional, defaults to latest)'
        required: false
        type: string

env:
  DEPLOY_USER: bominal
  DEPLOY_HOST: bominal.com  # Update this to your actual server hostname/IP

jobs:
  deploy:
    name: Deploy to bominal.com
    runs-on: ubuntu-latest
    # Only run if the build workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code (for metadata only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get commit SHA to deploy
        id: commit
        run: |
          if [[ -n "${{ github.event.inputs.commit }}" ]]; then
            DEPLOY_COMMIT="${{ github.event.inputs.commit }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            DEPLOY_COMMIT="${{ github.event.workflow_run.head_sha }}"
          else
            DEPLOY_COMMIT="${{ github.sha }}"
          fi
          echo "sha=$DEPLOY_COMMIT" >> $GITHUB_OUTPUT
          echo "short=$(echo $DEPLOY_COMMIT | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_COMMIT: ${{ steps.commit.outputs.sha }}
          DEPLOY_SHORT: ${{ steps.commit.outputs.short }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_COMMIT,DEPLOY_SHORT,GH_ACTOR
          script: |
            set -e
            
            echo "=============================================="
            echo "🚀 Starting Deployment"
            echo "=============================================="
            echo "Commit: $DEPLOY_COMMIT ($DEPLOY_SHORT)"
            echo "Actor:  $GH_ACTOR"
            echo "Time:   $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo ""
            
            # Run deployment script
            REPO_DIR="/opt/bominal/repo"
            DEPLOY_SCRIPT="$REPO_DIR/infra/scripts/deploy-zero-downtime.sh"
            
            # Make sure we have the latest deployment script
            cd "$REPO_DIR"
            git fetch origin
            git checkout origin/main -- infra/scripts/deploy-zero-downtime.sh
            chmod +x "$DEPLOY_SCRIPT"
            
            # Run deployment (deploys latest images by default)
            # The script will pull images tagged with :latest or specific SHA
            bash "$DEPLOY_SCRIPT" "$DEPLOY_SHORT"
            
            echo ""
            echo "=============================================="
            echo "✅ Deployment Complete!"
            echo "=============================================="
      
      - name: Report deployment status
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Deployment successful!"
            echo "Deployed commit: ${{ steps.commit.outputs.short }}"
            echo "Site: https://www.bominal.com"
          else
            echo "❌ Deployment failed!"
            echo "Check logs above for details"
            exit 1
          fi
      
      - name: Create deployment record
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const commit = '${{ steps.commit.outputs.sha }}';
            const shortCommit = '${{ steps.commit.outputs.short }}';
            
            // Create a deployment
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: commit,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deployed ${shortCommit} to bominal.com`
            });
            
            // Mark deployment as successful
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://www.bominal.com',
              description: 'Deployment completed successfully'
            });
            
            console.log(`✅ Deployment record created for ${shortCommit}`);
