# Build and push Docker images to Google Artifact Registry
#
# Triggered on:
#   - Push to main branch (automatic)
#   - Manual workflow dispatch
#
# This workflow builds images on GitHub's runners (7GB RAM) instead of
# the e2-micro production VM (1GB RAM) to prevent OOM during builds.

name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: false
        type: boolean

env:
  # Google Cloud settings
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  
  # Image names
  API_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bominal/api
  WEB_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bominal/web

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.changes.outputs.api }}
      web_changed: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
  build-api:
    name: Build API Image
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true' || github.event.inputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web Image
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true' || github.event.inputs.force_rebuild == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-complete:
    name: Deployment Ready
    needs: [build-api, build-web]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        run: |
          echo "API build: ${{ needs.build-api.result }}"
          echo "Web build: ${{ needs.build-web.result }}"
          
          if [[ "${{ needs.build-api.result }}" == "failure" ]] || [[ "${{ needs.build-web.result }}" == "failure" ]]; then
            echo "One or more builds failed"
            exit 1
          fi
          
          echo ""
          echo "Images are ready for deployment!"
          echo ""
          echo "To deploy on the VM:"
          echo "  sudo -u bominal /opt/bominal/repo/infra/scripts/deploy-zero-downtime.sh --pull"
          echo ""
          echo "Image tags:"
          echo "  API: ${{ env.API_IMAGE }}:${{ github.sha }}"
          echo "  Web: ${{ env.WEB_IMAGE }}:${{ github.sha }}"
