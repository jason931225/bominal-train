name: CD Non-Production

on:
  push:
    branches:
      - dev
      - staging
    paths:
      - runtime/**
      - env/dev/**
      - env/staging/**
      - .github/workflows/cd-nonprod.yml
      - '!**/*.md'
      - '!docs/**'
  workflow_dispatch:
    inputs:
      target:
        description: Target non-production environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
      deploy:
        description: Run non-production deploy after publishing images
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: cd-nonprod-${{ github.ref_name || github.event.inputs.target }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/bominal-api
  WORKER_IMAGE_NAME: ${{ github.repository_owner }}/bominal-worker

jobs:
  budget-policy:
    name: CD Non-Production Budget Policy
    uses: ./.github/workflows/actions-budget-governor.yml

  cd-budget-guard:
    name: CD Non-Production Budget Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - budget-policy
    env:
      GLOBAL_MODE: ${{ needs.budget-policy.outputs.global_mode }}
      HOTFIX_PREFIX: ${{ vars.ACTIONS_HOTFIX_BRANCH_PREFIX }}
    steps:
      - name: Enforce non-production CD global budget policy
        uses: actions/github-script@v7
        with:
          script: |
            const mode = process.env.GLOBAL_MODE || "normal";
            if (mode !== "lockdown") {
              core.info(`global_mode=${mode}; non-production CD workflow allowed.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const hotfixPrefix = process.env.HOTFIX_PREFIX || "hotfix/";
            let hotfixAllowed = false;

            if (context.eventName === "push") {
              try {
                const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: context.sha,
                });
                hotfixAllowed = (pulls.data || []).some((pr) => pr.head?.ref?.startsWith(hotfixPrefix));
              } catch (error) {
                core.warning(`Unable to resolve associated PRs for hotfix check: ${String(error?.message || error)}`);
              }
            }

            if (hotfixAllowed) {
              core.warning("Global budget lockdown active, but associated hotfix PR detected; allowing non-production CD run.");
              return;
            }

            core.setFailed("Global Actions budget is in lockdown mode; non-production CD is blocked.");

  resolve-target:
    name: Resolve Deployment Target
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      target_branch: ${{ steps.resolve.outputs.target_branch }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Resolve environment and branch
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_input="${{ inputs.target }}"
            if [ "${target_input}" = "staging" ]; then
              echo "target_environment=staging" >> "${GITHUB_OUTPUT}"
              echo "target_branch=staging" >> "${GITHUB_OUTPUT}"
            else
              echo "target_environment=development" >> "${GITHUB_OUTPUT}"
              echo "target_branch=dev" >> "${GITHUB_OUTPUT}"
            fi
            if [ "${{ inputs.deploy }}" = "true" ]; then
              echo "should_deploy=true" >> "${GITHUB_OUTPUT}"
            else
              echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target_environment=staging" >> "${GITHUB_OUTPUT}"
            echo "target_branch=staging" >> "${GITHUB_OUTPUT}"
          else
            echo "target_environment=development" >> "${GITHUB_OUTPUT}"
            echo "target_branch=dev" >> "${GITHUB_OUTPUT}"
          fi
          echo "should_deploy=true" >> "${GITHUB_OUTPUT}"

  build-and-publish:
    name: Build and Publish Non-Production Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - resolve-target
      - cd-budget-guard
    permissions:
      contents: read
      packages: write
    outputs:
      api_image_ref: ${{ steps.refs.outputs.api_image_ref }}
      worker_image_ref: ${{ steps.refs.outputs.worker_image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve-target.outputs.target_branch }}-${{ github.sha }}
            type=sha,format=long,prefix=${{ needs.resolve-target.outputs.target_branch }}-

      - name: Extract worker image metadata
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve-target.outputs.target_branch }}-${{ github.sha }}
            type=sha,format=long,prefix=${{ needs.resolve-target.outputs.target_branch }}-

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile.api
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        id: build-worker
        uses: docker/build-push-action@v6
        with:
          context: runtime
          file: runtime/Dockerfile.worker
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish image refs
        id: refs
        run: |
          echo "api_image_ref=${REGISTRY}/${API_IMAGE_NAME}@${{ steps.build-api.outputs.digest }}" >> "${GITHUB_OUTPUT}"
          echo "worker_image_ref=${REGISTRY}/${WORKER_IMAGE_NAME}@${{ steps.build-worker.outputs.digest }}" >> "${GITHUB_OUTPUT}"

  deploy-nonprod:
    name: Deploy Non-Production
    if: needs.resolve-target.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve-target
      - build-and-publish
    environment: ${{ needs.resolve-target.outputs.target_environment }}
    concurrency:
      group: nonprod-deploy-${{ needs.resolve-target.outputs.target_environment }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate deployment variables
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_SCRIPT_PATH: ${{ vars.DEPLOY_SCRIPT_PATH }}
          DEPLOY_HEALTHCHECK_SCRIPT_PATH: ${{ vars.DEPLOY_HEALTHCHECK_SCRIPT_PATH }}
          DEPLOY_ROLLBACK_SCRIPT_PATH: ${{ vars.DEPLOY_ROLLBACK_SCRIPT_PATH }}
          VM_SECRET_ENV_FILE: ${{ vars.VM_SECRET_ENV_FILE }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_MIGRATIONS_DIR: ${{ vars.DEPLOY_MIGRATIONS_DIR }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_VM_BASELINE_SCRIPT: ${{ vars.DEPLOY_VM_BASELINE_SCRIPT }}
          DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          DEPLOY_HEALTHCHECK_LIVE_URL: ${{ vars.DEPLOY_HEALTHCHECK_LIVE_URL }}
          DEPLOY_HEALTHCHECK_READY_URL: ${{ vars.DEPLOY_HEALTHCHECK_READY_URL }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_DELAY_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_DELAY_SECONDS }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            DEPLOY_VM_NAME \
            DEPLOY_VM_ZONE \
            DEPLOY_WORKDIR \
            DEPLOY_SCRIPT_PATH \
            DEPLOY_HEALTHCHECK_SCRIPT_PATH \
            DEPLOY_ROLLBACK_SCRIPT_PATH \
            VM_SECRET_ENV_FILE \
            DEPLOY_RUNTIME_ENV_FILE \
            DEPLOY_COMPOSE_FILE \
            DEPLOY_MIGRATIONS_DIR \
            DEPLOY_API_SERVICE \
            DEPLOY_WORKER_SERVICE \
            DEPLOY_HEALTHCHECK_LIVE_URL \
            DEPLOY_HEALTHCHECK_READY_URL \
            POSTGRES_HOST \
            POSTGRES_PORT \
            POSTGRES_DB \
            POSTGRES_USER; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository/environment variable '${name}'"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Run remote deploy script
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_SCRIPT_PATH: ${{ vars.DEPLOY_SCRIPT_PATH }}
          VM_SECRET_ENV_FILE: ${{ vars.VM_SECRET_ENV_FILE }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_MIGRATIONS_DIR: ${{ vars.DEPLOY_MIGRATIONS_DIR }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_VM_BASELINE_SCRIPT: ${{ vars.DEPLOY_VM_BASELINE_SCRIPT }}
          DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          API_IMAGE: ${{ needs.build-and-publish.outputs.api_image_ref }}
          WORKER_IMAGE: ${{ needs.build-and-publish.outputs.worker_image_ref }}
        run: |
          set -euo pipefail
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_API_IMAGE=%q; export BOMINAL_WORKER_IMAGE=%q; export BOMINAL_POSTGRES_HOST=%q; export BOMINAL_POSTGRES_PORT=%q; export BOMINAL_POSTGRES_DB=%q; export BOMINAL_POSTGRES_USER=%q; export BOMINAL_VM_SECRET_ENV_FILE=%q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_MIGRATIONS_DIR=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_ROLLBACK_STATE_PATH=%q; export BOMINAL_VM_BASELINE_SCRIPT=%q; export BOMINAL_API_SERVICE=%q; export BOMINAL_WORKER_SERVICE=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${API_IMAGE}" \
            "${WORKER_IMAGE}" \
            "${POSTGRES_HOST}" \
            "${POSTGRES_PORT}" \
            "${POSTGRES_DB}" \
            "${POSTGRES_USER}" \
            "${VM_SECRET_ENV_FILE}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_MIGRATIONS_DIR}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_ROLLBACK_STATE_PATH}" \
            "${DEPLOY_VM_BASELINE_SCRIPT}" \
            "${DEPLOY_API_SERVICE}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${DEPLOY_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"

      - name: Run remote health check script
        id: healthcheck
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_HEALTHCHECK_SCRIPT_PATH: ${{ vars.DEPLOY_HEALTHCHECK_SCRIPT_PATH }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          DEPLOY_HEALTHCHECK_LIVE_URL: ${{ vars.DEPLOY_HEALTHCHECK_LIVE_URL }}
          DEPLOY_HEALTHCHECK_READY_URL: ${{ vars.DEPLOY_HEALTHCHECK_READY_URL }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_DELAY_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_DELAY_SECONDS }}
        run: |
          set -euo pipefail
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_API_SERVICE=%q; export BOMINAL_WORKER_SERVICE=%q; export BOMINAL_HEALTHCHECK_LIVE_URL=%q; export BOMINAL_HEALTHCHECK_READY_URL=%q; export BOMINAL_HEALTHCHECK_RETRIES=%q; export BOMINAL_HEALTHCHECK_DELAY_SECONDS=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_API_SERVICE}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${DEPLOY_HEALTHCHECK_LIVE_URL}" \
            "${DEPLOY_HEALTHCHECK_READY_URL}" \
            "${DEPLOY_HEALTHCHECK_RETRIES}" \
            "${DEPLOY_HEALTHCHECK_DELAY_SECONDS}" \
            "${DEPLOY_HEALTHCHECK_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"

      - name: Roll back on failed health check
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_ROLLBACK_SCRIPT_PATH: ${{ vars.DEPLOY_ROLLBACK_SCRIPT_PATH }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
        run: |
          set -euo pipefail
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_ROLLBACK_STATE_PATH=%q; export BOMINAL_API_SERVICE=%q; export BOMINAL_WORKER_SERVICE=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_ROLLBACK_STATE_PATH}" \
            "${DEPLOY_API_SERVICE}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${DEPLOY_ROLLBACK_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"
