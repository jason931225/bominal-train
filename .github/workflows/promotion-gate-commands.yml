name: Promotion Gate Commands

on:
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: read
  checks: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  commands:
    name: Handle Gate Commands
    if: startsWith(github.event.comment.body, '/gate ') || startsWith(github.event.comment.body, '/promote merge')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROJECT_AUTOMATION_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
      WORKSTREAMS_PROJECT_OWNER: ${{ vars.BOMINAL_WORKSTREAMS_PROJECT_OWNER }}
      WORKSTREAMS_PROJECT_NUMBER: ${{ vars.BOMINAL_WORKSTREAMS_PROJECT_NUMBER }}
      LEGACY_PROJECT_OWNER: ${{ vars.BOMINAL_PROJECT_OWNER }}
      LEGACY_PROJECT_NUMBER: ${{ vars.BOMINAL_PROJECT_NUMBER }}
    steps:
      - name: Route command
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueRef = context.payload.issue;
            const comment = context.payload.comment;
            const commentBody = (comment.body || "").trim();
            const commenter = comment.user?.login;

            const reply = async (body) => {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueRef.number, body });
            };

            const permissionResp = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: commenter,
            });
            const permission = permissionResp.data.permission;
            if (!["admin", "maintain", "write"].includes(permission)) {
              await reply(`@${commenter} is not authorized for promotion-gate commands (requires write/maintain/admin).`);
              core.setFailed(`Unauthorized command from ${commenter}`);
              return;
            }

            const appendWaiverLedger = (body, entry) => {
              const marker = "## Waiver Ledger";
              if (!body.includes(marker)) {
                return `${body}\n\n${marker}\n- ${entry}`;
              }
              const sectionRegex = /## Waiver Ledger\s*([\s\S]*?)(\n##\s+|$)/i;
              const match = body.match(sectionRegex);
              if (!match) {
                return `${body}\n\n${marker}\n- ${entry}`;
              }
              const before = body.slice(0, match.index);
              const sectionText = match[0];
              const after = body.slice(match.index + sectionText.length);
              const updatedSection = sectionText.replace(sectionRegex, (whole, content, trailer) => {
                const normalized = content.trim() === "- None" ? "" : content.trim();
                const lines = normalized ? `${normalized}\n- ${entry}` : `- ${entry}`;
                return `## Waiver Ledger\n${lines}${trailer || ""}`;
              });
              return `${before}${updatedSection}${after}`;
            };

            const trySetPromotionFlagField = async (gateIssueBody) => {
              if (!process.env.PROJECT_AUTOMATION_TOKEN) {
                return false;
              }
              const controlMatch = (gateIssueBody || "").match(/Control issue:\s*#(\d+)/i);
              if (!controlMatch) {
                return false;
              }
              const controlIssueNumber = Number(controlMatch[1]);
              if (!Number.isFinite(controlIssueNumber) || controlIssueNumber <= 0) {
                return false;
              }

              const projectOwner = (process.env.WORKSTREAMS_PROJECT_OWNER || process.env.LEGACY_PROJECT_OWNER || "").trim();
              const projectNumber = Number(process.env.WORKSTREAMS_PROJECT_NUMBER || process.env.LEGACY_PROJECT_NUMBER || 0);
              if (!projectOwner || !Number.isFinite(projectNumber) || projectNumber <= 0) {
                return false;
              }

              const qUser = `
                query($owner:String!, $number:Int!, $after:String) {
                  user(login:$owner) {
                    projectV2(number:$number) {
                      id
                      fields(first:100) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                      items(first:100, after:$after) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on Issue { number } }
                        }
                      }
                    }
                  }
                }`;
              const qOrg = `
                query($owner:String!, $number:Int!, $after:String) {
                  organization(login:$owner) {
                    projectV2(number:$number) {
                      id
                      fields(first:100) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                      items(first:100, after:$after) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on Issue { number } }
                        }
                      }
                    }
                  }
                }`;

              const graph = github.graphql.defaults({ headers: { authorization: `token ${process.env.PROJECT_AUTOMATION_TOKEN}` } });

              const loadPage = async (after) => {
                try {
                  const userResp = await graph(qUser, { owner: projectOwner, number: projectNumber, after });
                  if (userResp.user?.projectV2) return userResp.user.projectV2;
                } catch (error) {
                  const message = String(error?.message || "");
                  if (!message.includes("Could not resolve to a User")) {
                    throw error;
                  }
                }
                const orgResp = await graph(qOrg, { owner: projectOwner, number: projectNumber, after });
                return orgResp.organization?.projectV2 || null;
              };

              const firstPage = await loadPage(null);
              if (!firstPage) return false;

              const promotionField = firstPage.fields.nodes.find((node) => node.name === "Promotion Flag" && Array.isArray(node.options));
              const promoteOption = promotionField?.options?.find((opt) => opt.name === "Promote");
              if (!promotionField?.id || !promoteOption?.id) {
                return false;
              }

              let after = null;
              let itemId = null;
              while (true) {
                const page = await loadPage(after);
                if (!page) break;
                const found = (page.items.nodes || []).find((node) => node.content?.number === controlIssueNumber);
                if (found) {
                  itemId = found.id;
                  break;
                }
                if (!page.items.pageInfo.hasNextPage) break;
                after = page.items.pageInfo.endCursor;
              }

              if (!itemId) {
                return false;
              }

              await graph(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: firstPage.id,
                itemId,
                fieldId: promotionField.id,
                optionId: promoteOption.id,
              });

              return true;
            };

            if (commentBody.startsWith("/promote merge")) {
              if (!issueRef.pull_request) {
                await reply("`/promote merge` can only be used on a promotion pull request.");
                return;
              }

              const prNumber = issueRef.number;
              const prResp = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const pr = prResp.data;

              const allowedPairs = new Set(["dev->staging", "staging->main", "main->staging", "staging->dev"]);
              const pair = `${pr.head.ref}->${pr.base.ref}`;
              if (!allowedPairs.has(pair)) {
                await reply(`@${commenter} command rejected. ${pair} is not a valid promotion/back-promotion pair.`);
                core.setFailed(`Invalid promotion pair: ${pair}`);
                return;
              }

              const checks = await github.rest.checks.listForRef({ owner, repo, ref: pr.head.sha, per_page: 100 });
              const checkRuns = (checks.data.check_runs || []).filter((run) => run.name !== "Branch Policy Gate");
              const failed = checkRuns.filter((run) => run.status === "completed" && !["success", "neutral", "skipped"].includes(run.conclusion));
              const pending = checkRuns.filter((run) => run.status !== "completed");
              if (failed.length > 0 || pending.length > 0) {
                await reply(`@${commenter} merge blocked. Failed checks: [${failed.map((run) => `${run.name}=${run.conclusion}`).join(", ") || "none"}] Pending: [${pending.map((run) => run.name).join(", ") || "none"}]`);
                core.setFailed("Promotion merge blocked by checks.");
                return;
              }

              const reviewsResp = await github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber, per_page: 100 });
              const latestByUser = new Map();
              for (const review of reviewsResp.data) {
                if (review.user?.login) latestByUser.set(review.user.login, review.state);
              }
              if ([...latestByUser.values()].includes("CHANGES_REQUESTED")) {
                await reply(`@${commenter} merge blocked: unresolved CHANGES_REQUESTED review state present.`);
                core.setFailed("CHANGES_REQUESTED state active.");
                return;
              }

              await github.rest.pulls.merge({ owner, repo, pull_number: prNumber, merge_method: "squash" });
              await reply(`Promotion merge completed by @${commenter} via /promote merge.`);
              return;
            }

            if (!commentBody.startsWith("/gate ")) {
              return;
            }

            if (issueRef.pull_request) {
              await reply("`/gate` commands are only valid on gate issues (not on pull requests). Use `/promote merge` on promotion PRs.");
              return;
            }

            const gateIssueResp = await github.rest.issues.get({ owner, repo, issue_number: issueRef.number });
            const gateIssue = gateIssueResp.data;
            const labels = (gateIssue.labels || []).map((label) => typeof label === "string" ? label : label.name);
            if (!labels.includes("gate:open")) {
              await reply("This issue is not labeled `gate:open`; gate commands are ignored.");
              return;
            }

            if (commentBody.startsWith("/gate refresh")) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: "promotion-gate.yml",
                ref: context.payload.repository.default_branch,
                inputs: { gate_issue_number: String(issueRef.number) },
              });
              await reply(`@${commenter} queued a gate refresh for #${issueRef.number}.`);
              return;
            }

            if (commentBody.startsWith("/gate promote")) {
              if (!labels.includes("gate:promote")) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueRef.number, labels: ["gate:promote"] });
              }
              const projectFlagSet = await trySetPromotionFlagField(gateIssue.body || "");
              await reply(`@${commenter} set promotion intent for this gate.${projectFlagSet ? " Workstreams `Promotion Flag` set to `Promote`." : " (Project field update skipped/unavailable.)"}`);
              return;
            }

            if (commentBody.startsWith("/gate waive advisory")) {
              const regex = /^\/gate\s+waive\s+advisory\s+([^\s]+)\s+reason:"([^"]+)"\s+risk:"([^"]+)"\s+expires:"([0-9]{4}-[0-9]{2}-[0-9]{2})"(?:\s+followup:"(#\d+)")?$/i;
              const match = commentBody.match(regex);
              if (!match) {
                await reply("Usage: `/gate waive advisory <finding_id> reason:\"...\" risk:\"...\" expires:\"YYYY-MM-DD\" followup:\"#123\"(optional)`");
                core.setFailed("Invalid waiver command format.");
                return;
              }

              const findingId = match[1];
              const reason = match[2];
              const risk = match[3];
              const expires = match[4];
              const followup = match[5] || "none";

              if (!labels.includes("gate:advisory-waived")) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueRef.number, labels: ["gate:advisory-waived"] });
              }

              const entry = `finding=${findingId}; reason=${reason}; risk=${risk}; expires=${expires}; followup=${followup}; by=@${commenter}`;
              const updatedBody = appendWaiverLedger(gateIssue.body || "", entry);
              await github.rest.issues.update({ owner, repo, issue_number: issueRef.number, body: updatedBody });
              await reply(`@${commenter} advisory waiver recorded for \`${findingId}\` (expires ${expires}).`);
              return;
            }

            await reply(`@${commenter} unknown gate command. Supported: /gate refresh, /gate promote, /gate waive advisory ...`);
