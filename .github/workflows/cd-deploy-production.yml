name: CD - Deploy Production

on:
  workflow_run:
    workflows: ["CI - Infra Quality Gates"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

concurrency:
  group: cd-deploy-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write

env:
  DEPLOY_PUBSUB_TOPIC: bominal-deploy-requests
  PROD_HEALTHCHECK_URL: https://www.bominal.com/health
  PROD_WEB_URL: https://www.bominal.com/
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}/bominal

  GCP_PROJECT_ID: bominal
  GCP_REGION: us-central1
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.name == 'CI - Infra Quality Gates' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Gate on successful Infra + image build workflows for same commit
        id: prereq
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.payload.workflow_run?.head_sha || context.sha;
            const bypassPolicyGates = "${{ vars.CI_ALLOW_POLICY_GATES_BYPASS }}" === "true";
            if (bypassPolicyGates) {
              core.warning(
                "Bypassing deploy prerequisite workflow gate because CI_ALLOW_POLICY_GATES_BYPASS=true."
              );
              core.setOutput("target_sha", targetSha);
              core.setOutput("build_required", "false");
              core.setOutput("build_run_id", "");
              core.setOutput("api_changed", "false");
              core.setOutput("web_changed", "false");
              return;
            }
            const maxAttempts = 40;
            const sleepMs = 15000;
            const buildPathMatchers = [
              /^api\//,
              /^web\//,
              /^docs\/releases\//,
              /^infra\/scripts\/version_guard\.py$/,
              /^\.github\/workflows\/ci-build-publish-images\.yml$/,
            ];

            const commit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: targetSha,
            });
            const changedFiles = (commit.data.files || []).map((file) => file.filename);
            const buildRequired = changedFiles.some((path) =>
              buildPathMatchers.some((matcher) => matcher.test(path))
            );
            const requiredWorkflows = ["CI - Infra Quality Gates"];
            if (buildRequired) {
              requiredWorkflows.push("CI - Build and Publish Images");
            }
            core.info(
              `Prerequisite policy for ${targetSha}: buildRequired=${buildRequired}, changedFiles=${changedFiles.length}`
            );

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const selected = new Map();

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: targetSha,
                per_page: 100,
              });

              for (const workflowName of requiredWorkflows) {
                const run = data.workflow_runs.find((item) => item.name === workflowName) || null;
                if (run) {
                  selected.set(workflowName, run);
                }
              }

              const allCompleted = requiredWorkflows.every((workflowName) => {
                const run = selected.get(workflowName);
                return run && run.status === "completed";
              });
              if (allCompleted) {
                break;
              }

              core.info(
                `Waiting for prerequisite workflows on ${targetSha} (attempt ${attempt}/${maxAttempts})...`
              );
              await sleep(sleepMs);
            }

            for (const workflowName of requiredWorkflows) {
              const run = selected.get(workflowName);
              if (!run) {
                core.setFailed(`No '${workflowName}' run found for commit ${targetSha}. Deploy blocked.`);
                return;
              }
              if (run.status !== "completed") {
                core.setFailed(
                  `'${workflowName}' for ${targetSha} did not complete in time (status=${run.status}). Deploy blocked.`
                );
                return;
              }
              if (run.conclusion !== "success") {
                core.setFailed(
                  `'${workflowName}' for ${targetSha} concluded with '${run.conclusion}'. Deploy blocked.`
                );
                return;
              }
            }

            core.info(`Prerequisite workflows succeeded for ${targetSha}; deploy gate passed.`);

            const buildRun = selected.get("CI - Build and Publish Images");
            const workflowJobs = {
              "Build API Image": "api_changed",
              "Build Web Image": "web_changed",
            };
            const changed = {
              api_changed: false,
              web_changed: false,
            };

            if (buildRun) {
              let page = 1;
              while (true) {
                const { data } = await github.rest.actions.listJobsForWorkflowRun({
                  owner,
                  repo,
                  run_id: buildRun.id,
                  per_page: 100,
                  page,
                });
                for (const job of data.jobs) {
                  const key = workflowJobs[job.name];
                  if (!key) continue;
                  changed[key] = job.conclusion === "success";
                  core.info(`Build job '${job.name}' conclusion=${job.conclusion}`);
                }
                if (data.jobs.length < 100) break;
                page += 1;
              }
            } else {
              core.info("No build workflow required for this commit; image overrides will remain empty.");
            }

            core.setOutput("target_sha", targetSha);
            core.setOutput("build_required", String(buildRequired));
            core.setOutput("build_run_id", buildRun ? String(buildRun.id) : "");
            core.setOutput("api_changed", String(changed.api_changed));
            core.setOutput("web_changed", String(changed.web_changed));

      - name: Validate deprecation gates
        if: vars.CI_ALLOW_POLICY_GATES_BYPASS != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash infra/tests/test_deprecation_policy.sh
          bash infra/tests/test_deprecation_references.sh

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Publish deploy request (Pub/Sub)
        shell: bash
        run: |
          set -euo pipefail

          commit="${{ steps.prereq.outputs.target_sha }}"
          # CI image tags use short git SHA tags (7 chars), not full 40-char SHAs.
          commit_tag="${commit:0:7}"
          mode="latest"
          ghcr_namespace="${{ env.GHCR_NAMESPACE }}"

          api_image=""
          worker_image=""
          web_image=""

          if [[ "${{ steps.prereq.outputs.api_changed }}" == "true" ]]; then
            api_image="${ghcr_namespace}/api:${commit_tag}"
            worker_image="${ghcr_namespace}/api:${commit_tag}"
          fi
          if [[ "${{ steps.prereq.outputs.web_changed }}" == "true" ]]; then
            web_image="${ghcr_namespace}/web:${commit_tag}"
          fi

          echo "Deploy request:"
          echo "  mode:   $mode"
          echo "  commit: $commit"
          echo "  tag:    $commit_tag"
          echo "  api_image: ${api_image:-<latest>}"
          echo "  worker_image: ${worker_image:-<latest>}"
          echo "  web_image: ${web_image:-<latest>}"

          export DEPLOY_COMMIT="$commit"
          export DEPLOY_COMMIT_TAG="$commit_tag"
          export DEPLOY_API_IMAGE="$api_image"
          export DEPLOY_WORKER_IMAGE="$worker_image"
          export DEPLOY_WEB_IMAGE="$web_image"

          # Publish without a preflight `topics describe` to keep least privilege
          # (roles/pubsub.publisher doesn't include pubsub.topics.get).
          message="$(python3 - <<'PY'
          import json
          import os
          payload = {
              "app": "bominal",
              "action": "deploy",
              "mode": "latest",
              "commit": os.environ.get("DEPLOY_COMMIT", ""),
              "commit_tag": os.environ.get("DEPLOY_COMMIT_TAG", ""),
              "api_image": os.environ.get("DEPLOY_API_IMAGE", ""),
              "worker_image": os.environ.get("DEPLOY_WORKER_IMAGE", ""),
              "web_image": os.environ.get("DEPLOY_WEB_IMAGE", ""),
              "actor": os.environ.get("GITHUB_ACTOR", ""),
              "event": os.environ.get("GITHUB_EVENT_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"

          gcloud pubsub topics publish "${{ env.DEPLOY_PUBSUB_TOPIC }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --message="$message" \
            --attribute="app=bominal" \
            --attribute="mode=latest" \
            --attribute="commit=$commit" \
            --attribute="commit_tag=$commit_tag" \
            --attribute="api_image=$api_image" \
            --attribute="worker_image=$worker_image" \
            --attribute="web_image=$web_image" \
            --attribute="run_id=${{ github.run_id }}" \
            --attribute="run_attempt=${{ github.run_attempt }}"

  post-deploy-verify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Verify production API health after deploy request
        shell: bash
        run: |
          set -euo pipefail

          ok=false
          for attempt in $(seq 1 36); do
            body="$(curl -fsS --max-time 10 "${{ env.PROD_HEALTHCHECK_URL }}" 2>/dev/null || true)"
            if [[ -n "$body" ]] \
              && echo "$body" | grep -Eq '"db"[[:space:]]*:[[:space:]]*true' \
              && echo "$body" | grep -Eq '"redis"[[:space:]]*:[[:space:]]*true'; then
              ok=true
              echo "Health gate passed on attempt ${attempt}."
              break
            fi
            echo "Waiting for healthy production API (${attempt}/36)..."
            sleep 10
          done

          if [[ "$ok" != "true" ]]; then
            echo "Post-deploy verification failed: API health did not report db=true and redis=true."
            exit 1
          fi

      - name: Verify production web endpoint
        shell: bash
        run: |
          set -euo pipefail
          code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "${{ env.PROD_WEB_URL }}" || true)"
          case "$code" in
            200|301|302|307|308) echo "Web gate passed (HTTP $code)." ;;
            *)
              echo "Post-deploy verification failed: web endpoint returned HTTP ${code:-<empty>}."
              exit 1
              ;;
          esac
