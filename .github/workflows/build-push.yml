name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'docs/releases/**'
      - 'infra/scripts/version_guard.py'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/api-gateway
  API_TRAIN_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/api-train
  API_RESTAURANT_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/api-restaurant
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/web

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      api_train: ${{ steps.filter.outputs.api_train }}
      api_restaurant: ${{ steps.filter.outputs.api_restaurant }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_gateway:
              - 'api/app/main_gateway.py'
              - 'api/app/http/**'
              - 'api/app/core/**'
              - 'api/app/db/**'
              - 'api/app/schemas/**'
              - 'api/app/services/**'
              - 'api/alembic/**'
              - 'api/scripts/**'
              - 'api/Dockerfile.prod'
              - 'api/requirements*.txt'
              - '.github/workflows/build-push.yml'
            api_train:
              - 'api/app/main_train.py'
              - 'api/app/worker_train.py'
              - 'api/app/modules/train/**'
              - 'api/app/http/**'
              - 'api/app/core/**'
              - 'api/app/db/**'
              - 'api/app/schemas/**'
              - 'api/app/services/**'
              - 'api/alembic/**'
              - 'api/Dockerfile.prod'
              - 'api/requirements*.txt'
              - '.github/workflows/build-push.yml'
            api_restaurant:
              - 'api/app/main_restaurant.py'
              - 'api/app/worker_restaurant.py'
              - 'api/app/modules/restaurant/**'
              - 'api/app/http/**'
              - 'api/app/core/**'
              - 'api/app/db/**'
              - 'api/app/schemas/**'
              - 'api/app/services/**'
              - 'api/alembic/**'
              - 'api/Dockerfile.prod'
              - 'api/requirements*.txt'
              - '.github/workflows/build-push.yml'
            web:
              - 'web/**'
              - 'docs/releases/**'
              - 'infra/scripts/version_guard.py'
              - '.github/workflows/build-push.yml'

  build-api-gateway:
    name: Build API Gateway Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api_gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_GATEWAY_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push API gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-api-train:
    name: Build API Train Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api_train == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_TRAIN_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push API train image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-api-restaurant:
    name: Build API Restaurant Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api_restaurant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_RESTAURANT_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push API restaurant image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-web:
    name: Build Web Image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve app version
        id: app_version
        run: |
          resolved="$(python3 infra/scripts/version_guard.py resolve --commit "$GITHUB_SHA")"
          numeric="${resolved#v}"
          numeric="${numeric%%-*}"
          numeric="${numeric%%+*}"
          echo "app_version=$numeric" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: $resolved"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            APP_VERSION=${{ steps.app_version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
