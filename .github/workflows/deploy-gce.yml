name: deploy-gce

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-gce.yml"
      - "api/**"
      - "web/**"
      - "infra/**"
      - "docs/DEPLOYMENT.md"
  workflow_dispatch:

concurrency:
  group: deploy-gce-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start validation stack
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Backend tests
        run: docker compose -f infra/docker-compose.yml exec -T api pytest -q

      - name: Frontend type check
        run: docker compose -f infra/docker-compose.yml exec -T web npx tsc --noEmit

      - name: Stop validation stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  build-images:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_prefix: ${{ steps.prep.outputs.image_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image prefix
        id: prep
        run: echo "image_prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/bominal" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.prep.outputs.image_prefix }}/api:${{ github.sha }}
            ${{ steps.prep.outputs.image_prefix }}/api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.prep.outputs.image_prefix }}/web:${{ github.sha }}
            ${{ steps.prep.outputs.image_prefix }}/web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    steps:
      - name: Deploy to GCE VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          BOMINAL_IMAGE_PREFIX: ${{ needs.build-images.outputs.image_prefix }}
          BOMINAL_IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.GCE_DEPLOY_PATH }}
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_SSH_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script_stop: true
          envs: BOMINAL_IMAGE_PREFIX,BOMINAL_IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,DEPLOY_PATH,GITHUB_SHA
          script: |
            set -euo pipefail
            DEPLOY_DIR="${DEPLOY_PATH:-/opt/bominal}"
            cd "$DEPLOY_DIR"
            git fetch --all --prune
            git checkout "$GITHUB_SHA"
            git submodule update --init --recursive
            bash infra/scripts/deploy-gce.sh
