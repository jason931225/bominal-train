name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint GitHub Actions workflows
        run: |
          docker run --rm -v "$PWD":/repo -w /repo rhysd/actionlint:latest -color -oneline .github/workflows/*.yml

  internal-sdk-contract:
    name: Internal SDK Contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify internal OpenAPI and generated SDK artifacts
        run: ./scripts/generate-internal-sdk.sh --check

  frontend-artifact-policy:
    name: Frontend Artifact Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enforce generated-only frontend dist policy
        run: ./scripts/tests/test_frontend_dist_untracked.sh

  script-quality:
    name: Script Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi

      - name: Lint shell scripts
        run: shellcheck -x scripts/prod-up.sh scripts/clean-runtime-debug.sh scripts/tests/*.sh

      - name: Run production operator script tests
        run: |
          bash scripts/tests/test_prod_up.sh
          bash scripts/tests/test_clean_runtime_debug.sh

  runtime-api-image-smoke:
    name: Runtime API Image Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build runtime API image from clean frontend dist
        run: ./scripts/tests/test_runtime_api_image_smoke.sh

  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend_css: ${{ steps.filter.outputs.frontend_css }}
      payment_crypto: ${{ steps.filter.outputs.payment_crypto }}
      station_catalog: ${{ steps.filter.outputs.station_catalog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend_css:
              - 'runtime/frontend/**'
            payment_crypto:
              - 'runtime/cloudrun/payment-crypto/**'
            station_catalog:
              - 'runtime/data/train/**'
              - 'runtime/crates/shared/src/station_catalog.rs'
              - 'runtime/crates/api/src/bin/station_catalog_sync.rs'

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - workflow-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: cargo-audit

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: cargo-deny

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo deny checks
        run: cargo deny check advisories bans sources

  cargo-udeps:
    name: Cargo Udeps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: cargo-udeps

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo udeps
        run: cargo +nightly udeps --workspace --all-targets --locked

  rust-quality:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Compile with locked dependencies
        run: cargo check --workspace --locked

      - name: Lint
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

  rust-coverage:
    name: Rust Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust-quality
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: cov

      - name: Install coverage tooling
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce line coverage floor
        env:
          RUST_COVERAGE_MIN: ${{ vars.RUST_COVERAGE_MIN }}
        run: |
          mkdir -p target/coverage
          coverage_min="${RUST_COVERAGE_MIN:-50}"
          cargo llvm-cov --workspace --fail-under-lines "${coverage_min}" --lcov --output-path target/coverage/lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: runtime/target/coverage/lcov.info

  payment-crypto-tests:
    name: Payment Crypto Go Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.payment_crypto == 'true'
    timeout-minutes: 15
    needs:
      - changes
      - secret-scan
    defaults:
      run:
        working-directory: runtime/cloudrun/payment-crypto
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/cloudrun/payment-crypto/go.mod
          cache: true

      - name: Run payment-crypto tests
        run: go test ./...

  station-catalog-validate:
    name: Station Catalog Snapshot Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.station_catalog == 'true'
    timeout-minutes: 15
    needs:
      - changes
      - secret-scan
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: station-catalog

      - name: Validate station catalog snapshot
        run: cargo run -p bominal-api --bin station_catalog_sync -- validate --snapshot data/train/station_catalog.v1.json --meta data/train/station_catalog.meta.json

  frontend-assets:
    name: Frontend Asset Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend_css == 'true'
    timeout-minutes: 15
    needs:
      - changes
      - secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runtime/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix runtime/frontend

      - name: Build frontend CSS bundle
        run: npm --prefix runtime/frontend run build:css

      - name: Enforce frontend CSS budget
        run: npm --prefix runtime/frontend run check:css:budget
