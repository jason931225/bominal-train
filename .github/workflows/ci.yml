name: CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
    paths-ignore:
      - docs/**
      - "**/*.md"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  budget-policy:
    name: CI Budget Policy
    uses: ./.github/workflows/actions-budget-governor.yml

  pr-execution-policy:
    name: PR Execution Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - budget-policy
    outputs:
      run_heavy: ${{ steps.policy.outputs.run_heavy }}
      ci_tier_label: ${{ steps.policy.outputs.ci_tier_label }}
      is_hotfix: ${{ steps.policy.outputs.is_hotfix }}
      budget_override: ${{ steps.policy.outputs.budget_override }}
    steps:
      - name: Resolve execution policy
        id: policy
        uses: actions/github-script@v7
        env:
          NONCD_MODE: ${{ needs.budget-policy.outputs.noncd_mode }}
          HOTFIX_PREFIX: ${{ vars.ACTIONS_HOTFIX_BRANCH_PREFIX }}
        with:
          script: |
            const eventName = context.eventName;
            const noncdMode = process.env.NONCD_MODE || "normal";
            const hotfixPrefix = process.env.HOTFIX_PREFIX || "hotfix/";

            if (eventName !== "pull_request") {
              core.setOutput("run_heavy", "true");
              core.setOutput("ci_tier_label", "manual");
              core.setOutput("is_hotfix", "false");
              core.setOutput("budget_override", "false");
              return;
            }

            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((label) => label.name);
            const ciTierLabel = labels.find((name) => name.startsWith("ci:tier:")) || "ci:tier:standard";
            const isHotfix = pr.head.ref.startsWith(hotfixPrefix);
            const budgetOverride = labels.includes("budget:override");

            if (noncdMode === "lockdown" && !isHotfix && !budgetOverride) {
              core.setFailed(`Monthly non-CD Actions budget is in lockdown mode. Non-hotfix PRs are blocked until budget resets or override is applied.`);
              return;
            }

            let runHeavy = true;
            if (noncdMode === "throttle" && !isHotfix && !budgetOverride) {
              runHeavy = ciTierLabel === "ci:tier:heavy";
            }

            core.setOutput("run_heavy", runHeavy ? "true" : "false");
            core.setOutput("ci_tier_label", ciTierLabel);
            core.setOutput("is_hotfix", isHotfix ? "true" : "false");
            core.setOutput("budget_override", budgetOverride ? "true" : "false");

            core.summary
              .addHeading("PR Execution Policy")
              .addRaw(`noncd_mode=${noncdMode}\n`, true)
              .addRaw(`ci_tier=${ciTierLabel}\n`, true)
              .addRaw(`is_hotfix=${isHotfix}\n`, true)
              .addRaw(`budget_override=${budgetOverride}\n`, true)
              .addRaw(`run_heavy=${runHeavy}\n`, true)
              .write();

  frontend-artifact-policy:
    name: Frontend Artifact Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - pr-execution-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enforce generated-only frontend dist policy
        run: ./scripts/tests/test_frontend_dist_untracked.sh

  script-quality:
    name: Script Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - pr-execution-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi

      - name: Lint shell scripts
        run: shellcheck -x scripts/prod-up.sh scripts/clean-runtime-debug.sh scripts/tests/*.sh

      - name: Run production operator script tests
        run: |
          bash scripts/tests/test_prod_up.sh
          bash scripts/tests/test_clean_runtime_debug.sh

  runtime-api-image-smoke:
    name: Runtime API Image Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - rust-quality
      - pr-execution-policy
    if: needs.pr-execution-policy.outputs.run_heavy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build runtime API image from clean frontend dist
        run: ./scripts/tests/test_runtime_api_image_smoke.sh

  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    needs:
      - pr-execution-policy
    outputs:
      frontend_css: ${{ steps.filter.outputs.frontend_css }}
      payment_crypto: ${{ steps.filter.outputs.payment_crypto }}
      station_catalog: ${{ steps.filter.outputs.station_catalog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend_css:
              - 'runtime/frontend/**'
            payment_crypto:
              - 'runtime/cloudrun/payment-crypto/**'
            station_catalog:
              - 'runtime/data/train/**'
              - 'runtime/crates/shared/src/station_catalog.rs'
              - 'runtime/crates/api/src/bin/station_catalog_sync.rs'

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - pr-execution-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  copilot-review-budget:
    name: Copilot Review Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - pr-execution-policy
    env:
      COPILOT_REVIEW_MONTHLY_BUDGET: ${{ vars.COPILOT_REVIEW_MONTHLY_BUDGET }}
      COPILOT_REVIEW_WARN_THRESHOLD: ${{ vars.COPILOT_REVIEW_WARN_THRESHOLD }}
    steps:
      - name: Track monthly @copilot review usage
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const budget = Number(process.env.COPILOT_REVIEW_MONTHLY_BUDGET || 300);
            const warnThreshold = Number(process.env.COPILOT_REVIEW_WARN_THRESHOLD || 270);

            if (!Number.isFinite(budget) || budget <= 0) {
              core.setFailed(`Invalid COPILOT_REVIEW_MONTHLY_BUDGET value: ${process.env.COPILOT_REVIEW_MONTHLY_BUDGET || "<empty>"}`);
              return;
            }

            const now = new Date();
            const monthStart = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), 1)).toISOString();
            const monthLabel = `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, "0")}`;

            const comments = await github.paginate(github.rest.issues.listCommentsForRepo, {
              owner,
              repo,
              since: monthStart,
              per_page: 100,
            });

            const invocations = comments.filter((comment) => /@copilot\s+review/i.test(comment.body || ""));
            const used = invocations.length;
            const remaining = Math.max(0, budget - used);

            core.summary
              .addHeading("Copilot Review Budget")
              .addRaw(`Month (UTC): ${monthLabel}\n`, true)
              .addRaw(`Budget: ${budget}\n`, true)
              .addRaw(`Used: ${used}\n`, true)
              .addRaw(`Remaining: ${remaining}\n`, true)
              .write();

            if (used >= budget) {
              core.setFailed(`Copilot review budget exceeded for ${monthLabel}: used=${used}, budget=${budget}.`);
              return;
            }

            if (used >= warnThreshold) {
              core.warning(`Copilot review usage is near budget: used=${used}, budget=${budget}, remaining=${remaining}. Use judiciously.`);
            } else {
              core.info(`Copilot review usage OK: used=${used}, budget=${budget}, remaining=${remaining}.`);
            }

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    needs:
      - pr-execution-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime

  rust-quality:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - secret-scan
      - dependency-review
      - pr-execution-policy
    if: needs.pr-execution-policy.outputs.run_heavy == 'true'
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Compile with locked dependencies
        run: cargo check --workspace --locked

      - name: Lint
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --locked --lib --bins

  rust-integration:
    name: Rust Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - rust-quality
      - pr-execution-policy
    if: needs.pr-execution-policy.outputs.run_heavy == 'true'
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: integration

      - name: Run integration tests
        run: cargo test --workspace --locked --tests

  rust-coverage:
    name: Rust Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust-integration
      - pr-execution-policy
    if: needs.pr-execution-policy.outputs.run_heavy == 'true'
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: cov

      - name: Install coverage tooling
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce line coverage floor
        env:
          RUST_COVERAGE_MIN: ${{ vars.RUST_COVERAGE_MIN }}
        run: |
          mkdir -p target/coverage
          coverage_min="${RUST_COVERAGE_MIN:-35}"
          cargo llvm-cov --workspace --fail-under-lines "${coverage_min}" --lcov --output-path target/coverage/lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: runtime/target/coverage/lcov.info

  payment-crypto-tests:
    name: Payment Crypto Go Tests
    runs-on: ubuntu-latest
    if: needs.pr-execution-policy.outputs.run_heavy == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.payment_crypto == 'true')
    timeout-minutes: 15
    needs:
      - changes
      - rust-quality
      - secret-scan
      - pr-execution-policy
    defaults:
      run:
        working-directory: runtime/cloudrun/payment-crypto
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/cloudrun/payment-crypto/go.mod
          cache: true

      - name: Run payment-crypto tests
        run: go test ./...

  station-catalog-validate:
    name: Station Catalog Snapshot Validation
    runs-on: ubuntu-latest
    if: needs.pr-execution-policy.outputs.run_heavy == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.station_catalog == 'true')
    timeout-minutes: 15
    needs:
      - changes
      - rust-quality
      - secret-scan
      - pr-execution-policy
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime
          prefix-key: station-catalog

      - name: Validate station catalog snapshot
        run: cargo run -p bominal-api --bin station_catalog_sync -- validate --snapshot data/train/station_catalog.v1.json --meta data/train/station_catalog.meta.json

  frontend-assets:
    name: Frontend Asset Gate
    runs-on: ubuntu-latest
    if: needs.pr-execution-policy.outputs.run_heavy == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend_css == 'true')
    timeout-minutes: 15
    needs:
      - changes
      - rust-quality
      - secret-scan
      - pr-execution-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runtime/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix runtime/frontend

      - name: Build frontend CSS bundle
        run: npm --prefix runtime/frontend run build:css

      - name: Enforce frontend CSS budget
        run: npm --prefix runtime/frontend run check:css:budget
