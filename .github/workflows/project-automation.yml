name: Project Automation

on:
  issues:
    types:
      - opened
      - reopened
      - labeled
      - edited
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-project:
    name: Project Automation
    if: vars.BOMINAL_PROJECT_OWNER != '' && vars.BOMINAL_PROJECT_NUMBER != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROJECT_AUTOMATION_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
    steps:
      - name: Explain missing token
        if: env.PROJECT_AUTOMATION_TOKEN == ''
        run: |
          echo "Project automation is skipped because secrets.PROJECT_AUTOMATION_TOKEN is not configured."

      - name: Sync issue and PR state into Project v2
        if: env.PROJECT_AUTOMATION_TOKEN != ''
        uses: actions/github-script@v7
        env:
          PROJECT_OWNER: ${{ vars.BOMINAL_PROJECT_OWNER }}
          PROJECT_NUMBER: ${{ vars.BOMINAL_PROJECT_NUMBER }}
        with:
          github-token: ${{ env.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const ownerLogin = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);

            const queryUserProject = `
            query($owner:String!, $number:Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2FieldCommon { id name }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }`;

            const queryOrgProject = `
            query($owner:String!, $number:Int!) {
              organization(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2FieldCommon { id name }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }`;

            let project = null;
            try {
              const userResp = await github.graphql(queryUserProject, { owner: ownerLogin, number: projectNumber });
              project = userResp.user?.projectV2 || null;
            } catch (error) {
              const message = String(error?.message || "");
              if (!message.includes("Could not resolve to a User")) {
                throw error;
              }
            }

            if (!project) {
              try {
                const orgResp = await github.graphql(queryOrgProject, { owner: ownerLogin, number: projectNumber });
                project = orgResp.organization?.projectV2 || null;
              } catch (error) {
                const message = String(error?.message || "");
                if (!message.includes("Could not resolve to an Organization")) {
                  throw error;
                }
              }
            }

            if (!project) {
              core.setFailed(`Project v2 not found for owner=${ownerLogin} number=${projectNumber}`);
              return;
            }

            const fieldByName = new Map();
            const optionsByFieldName = new Map();
            for (const field of project.fields.nodes || []) {
              if (!field?.name || !field?.id) continue;
              fieldByName.set(field.name, field.id);
              if (Array.isArray(field.options)) {
                optionsByFieldName.set(
                  field.name,
                  new Map(field.options.map((opt) => [opt.name, opt.id]))
                );
              }
            }

            const getProjectItemId = async (contentId) => {
              let after = null;
              while (true) {
                const page = await github.graphql(`
                  query($projectId:ID!, $after:String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $after) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content {
                              ... on Issue { id }
                              ... on PullRequest { id }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId: project.id, after });

                const items = page.node.items.nodes || [];
                const found = items.find((item) => item.content?.id === contentId);
                if (found) return found.id;

                if (!page.node.items.pageInfo.hasNextPage) break;
                after = page.node.items.pageInfo.endCursor;
              }

              const added = await github.graphql(`
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId: project.id, contentId });

              return added.addProjectV2ItemById.item.id;
            };

            const resolveSingleSelectOptionName = (fieldName, optionName, fallbackOptions = []) => {
              const options = optionsByFieldName.get(fieldName);
              if (!options) {
                return null;
              }

              for (const candidate of [optionName, ...fallbackOptions]) {
                if (options.has(candidate)) {
                  return candidate;
                }
              }

              return null;
            };

            const setSingleSelectByName = async (itemId, fieldName, optionName, fallbackOptions = []) => {
              const fieldId = fieldByName.get(fieldName);
              const resolvedOptionName = resolveSingleSelectOptionName(fieldName, optionName, fallbackOptions);
              const optionId = optionsByFieldName.get(fieldName)?.get(resolvedOptionName);
              if (!fieldId || !optionId) {
                const availableOptions = [...(optionsByFieldName.get(fieldName)?.keys() || [])].join(", ");
                core.warning(
                  `Missing project field/option mapping for ${fieldName}=${optionName}; ` +
                  `fallbacks=[${fallbackOptions.join(", ")}], available=[${availableOptions}].`
                );
                return false;
              }

              await github.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: project.id,
                itemId,
                fieldId,
                optionId,
              });
              return true;
            };

            const statusFallbacks = {
              "Triage": ["Todo"],
              "Ready": ["Todo"],
              "In Progress": [],
              "In Review": ["In Progress"],
              "Blocked": ["In Progress", "Todo"],
              "Done": [],
            };

            const labelsToFieldValue = (labels, prefix, mapping) => {
              const label = labels.find((name) => name.startsWith(prefix));
              if (!label) return null;
              return mapping[label] || null;
            };

            if (context.eventName === "issues") {
              const issue = context.payload.issue;
              const action = context.payload.action;
              const labels = (issue.labels || []).map((l) => typeof l === "string" ? l : l.name);
              const itemId = await getProjectItemId(issue.node_id);

              const statusFromLabel = labelsToFieldValue(labels, "status:", {
                "status:triage": "Triage",
                "status:ready": "Ready",
                "status:in-progress": "In Progress",
                "status:review": "In Review",
                "status:blocked": "Blocked",
                "status:done": "Done",
              });

              let statusValue = null;
              if (statusFromLabel) {
                statusValue = statusFromLabel;
              } else if (action === "opened" || action === "reopened") {
                statusValue = "Triage";
              }
              if (statusValue) {
                await setSingleSelectByName(itemId, "Status", statusValue, statusFallbacks[statusValue] || []);
              }

              const typeValue = labelsToFieldValue(labels, "type:", {
                "type:bug": "Bug",
                "type:enhancement": "Enhancement",
                "type:documentation": "Docs",
                "type:chore": "Chore",
                "type:security": "Security",
                "type:ops": "Ops",
              });
              if (typeValue) await setSingleSelectByName(itemId, "Type", typeValue);

              const priorityValue = labelsToFieldValue(labels, "priority:", {
                "priority:p0": "P0",
                "priority:p1": "P1",
                "priority:p2": "P2",
                "priority:p3": "P3",
              });
              if (priorityValue) await setSingleSelectByName(itemId, "Priority", priorityValue);

              const riskValue = labelsToFieldValue(labels, "risk:", {
                "risk:low": "Low",
                "risk:medium": "Medium",
                "risk:high": "High",
              });
              if (riskValue) await setSingleSelectByName(itemId, "Risk", riskValue);

              core.info(`Synced issue #${issue.number} to project item ${itemId}`);
              return;
            }

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              const action = context.payload.action;
              if (action === "closed" && !pr.merged) {
                core.info(`PR #${pr.number} closed without merge; skipping linked issue status transition.`);
                return;
              }

              const status = (action === "closed" && pr.merged) ? "Done" : "In Review";
              const body = pr.body || "";
              const issueRefs = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:(?<owner>[A-Za-z0-9_.-]+)\/(?<repo>[A-Za-z0-9_.-]+))?#(?<issue>\d+)/ig)]
                .map((m) => ({
                  owner: m.groups?.owner || null,
                  repo: m.groups?.repo || null,
                  issueNumber: Number(m.groups?.issue),
                }))
                .filter((m) => Number.isFinite(m.issueNumber))
                .filter((m) => {
                  if (!m.owner || !m.repo) {
                    return true;
                  }
                  return (
                    m.owner.toLowerCase() === context.repo.owner.toLowerCase() &&
                    m.repo.toLowerCase() === context.repo.repo.toLowerCase()
                  );
                });

              for (const issueNumber of [...new Set(issueRefs.map((m) => m.issueNumber))]) {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                const itemId = await getProjectItemId(issue.data.node_id);
                await setSingleSelectByName(itemId, "Status", status, statusFallbacks[status] || []);
                core.info(`Updated linked issue #${issueNumber} status=${status}`);
              }
            }

  config-missing:
    name: Project Automation Config Missing
    if: vars.BOMINAL_PROJECT_OWNER == '' || vars.BOMINAL_PROJECT_NUMBER == ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain missing configuration
        run: |
          echo "Project automation is skipped because one or more required vars are missing:"
          echo "- vars.BOMINAL_PROJECT_OWNER"
          echo "- vars.BOMINAL_PROJECT_NUMBER"
