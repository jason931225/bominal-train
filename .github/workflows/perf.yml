name: Performance Baseline

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target runtime base URL (for example https://www.bominal.com)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  k6-internal-baseline:
    name: K6 Internal/API Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create perf output directory
        run: mkdir -p perf/out

      - name: Validate perf secrets
        env:
          K6_SERVICE_TOKEN: ${{ secrets.PERF_INTERNAL_SERVICE_TOKEN }}
        run: |
          if [[ -z "${K6_SERVICE_TOKEN}" ]]; then
            echo "PERF_INTERNAL_SERVICE_TOKEN secret is required" >&2
            exit 1
          fi

      - name: Run k6 baseline probes
        env:
          K6_BASE_URL: ${{ inputs.base_url }}
          K6_SERVICE_TOKEN: ${{ secrets.PERF_INTERNAL_SERVICE_TOKEN }}
          K6_ADMIN_COOKIE: ${{ secrets.PERF_ADMIN_COOKIE }}
        run: |
          docker run --rm \
            -e K6_BASE_URL \
            -e K6_SERVICE_TOKEN \
            -e K6_ADMIN_COOKIE \
            -v "$PWD":/work \
            -w /work \
            grafana/k6:0.49.0 \
            run /work/perf/k6/internal-api-baseline.js \
            --summary-export /work/perf/out/internal-api-baseline-summary.json

      - name: Upload baseline summary
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-k6-summary
          path: perf/out/internal-api-baseline-summary.json
