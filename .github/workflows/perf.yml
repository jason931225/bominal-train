name: Performance Baseline

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target runtime base URL (for example https://www.bominal.com)"
        required: true
        type: string
      service_token:
        description: "Internal service token for /internal/v1 endpoints"
        required: true
        type: string
      admin_cookie:
        description: "Optional admin session cookie for /api/admin perf probes"
        required: false
        type: string

permissions:
  contents: read

jobs:
  k6-internal-baseline:
    name: K6 Internal/API Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create perf output directory
        run: mkdir -p perf/out

      - name: Run k6 baseline probes
        env:
          K6_BASE_URL: ${{ inputs.base_url }}
          K6_SERVICE_TOKEN: ${{ inputs.service_token }}
          K6_ADMIN_COOKIE: ${{ inputs.admin_cookie }}
        run: |
          docker run --rm \
            -e K6_BASE_URL \
            -e K6_SERVICE_TOKEN \
            -e K6_ADMIN_COOKIE \
            -v "$PWD":/work \
            -w /work \
            grafana/k6:0.49.0 \
            run /work/perf/k6/internal-api-baseline.js \
            --summary-export /work/perf/out/internal-api-baseline-summary.json

      - name: Upload baseline summary
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-k6-summary
          path: perf/out/internal-api-baseline-summary.json
