name: Bootstrap VM for OS Login Deploys

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DEPLOY_INSTANCE: bominal-deploy
  DEPLOY_ZONE: us-central1-a

  GCP_PROJECT_ID: bominal
  GCP_SERVICE_ACCOUNT: github-actions@bominal.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/833094198766/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Generate ephemeral SSH key (RSA PEM)
        id: key
        shell: bash
        run: |
          ssh-keygen -t rsa -b 4096 -m PEM -N "" -f /tmp/gha_vm_key
          # Prevent private key leakage in later step logs.
          while IFS= read -r line; do
            echo "::add-mask::$line"
          done < /tmp/gha_vm_key
          echo "private_key<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gha_vm_key >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Bootstrap VM
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ env.DEPLOY_INSTANCE }}
          zone: ${{ env.DEPLOY_ZONE }}
          ssh_private_key: ${{ steps.key.outputs.private_key }}
          command: |
            set -euo pipefail

            echo "=== identity ==="
            whoami
            id

            echo "=== sudo check (must be NO password prompt) ==="
            sudo -n true

            echo "=== ensure docker installed & running ==="
            command -v docker
            sudo -n systemctl enable --now docker || true
            sudo -n systemctl start docker || true

            echo "=== docker config sanity (GHCR pull path) ==="
            sudo -n mkdir -p /etc/docker
            if [[ -f /etc/docker/config.json ]]; then
              sudo -n cat /etc/docker/config.json || true
            else
              echo "{}" | sudo -n tee /etc/docker/config.json >/dev/null
            fi

            echo "=== allow current OS Login user to use docker ==="
            # This makes future sessions able to use docker without sudo.
            sudo -n usermod -aG docker "$(whoami)" || true

            echo "=== repo readability for OS Login users ==="
            # Make repo readable & directories traversable for non-owner users.
            sudo -n chmod -R a+rX /opt/bominal/repo

            echo "=== verify docker socket access (may require next SSH session) ==="
            # If this fails with docker.sock permission, the group change will apply next login.
            docker ps || true

            echo "=== show system docker config ==="
            sudo -n cat /etc/docker/config.json

            echo "=== done ==="
