name: Station Catalog Refresh

on:
  schedule:
    # 09:00 KST daily, expressed in canonical UTC.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: station-catalog-refresh
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  refresh:
    name: Refresh Station Catalog Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Check upstream station source hash
        id: check
        run: |
          set -euo pipefail
          cd runtime
          output="$(cargo run -p bominal-api --bin station_catalog_sync -- check --snapshot data/train/station_catalog.v1.json --meta data/train/station_catalog.meta.json)"
          printf '%s\n' "${output}"

          changed="$(printf '%s\n' "${output}" | awk -F= '/^changed=/{print $2}')"
          source_sha256="$(printf '%s\n' "${output}" | awk -F= '/^source_sha256=/{print $2}')"

          if [ -z "${changed}" ] || [ -z "${source_sha256}" ]; then
            echo "failed to parse station catalog check output" >&2
            exit 1
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
          echo "source_sha256=${source_sha256}" >> "${GITHUB_OUTPUT}"

      - name: Generate updated station catalog snapshot
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd runtime
          cargo run -p bominal-api --bin station_catalog_sync -- generate --snapshot data/train/station_catalog.v1.json --meta data/train/station_catalog.meta.json

      - name: Validate generated station catalog snapshot
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd runtime
          cargo run -p bominal-api --bin station_catalog_sync -- validate --snapshot data/train/station_catalog.v1.json --meta data/train/station_catalog.meta.json

      - name: Compute PR naming
        id: naming
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          source_sha256='${{ steps.check.outputs.source_sha256 }}'
          echo "short_sha=${source_sha256:0:8}" >> "${GITHUB_OUTPUT}"
          echo "utc_date=$(date -u +%Y%m%d)" >> "${GITHUB_OUTPUT}"

      - name: Detect snapshot file changes
        id: diff
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- runtime/data/train/station_catalog.v1.json runtime/data/train/station_catalog.meta.json; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open refresh pull request
        if: steps.check.outputs.changed == 'true' && steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(train): refresh station catalog snapshot'
          title: 'chore(train): refresh station catalog snapshot'
          body: |
            Automated daily station catalog refresh.

            - Source URL: `https://app.srail.or.kr/js/stationInfo.js`
            - Source SHA256: `${{ steps.check.outputs.source_sha256 }}`
            - Generated by workflow: `${{ github.workflow }}` run `${{ github.run_id }}`

            This PR requires manual review before merge.
          branch: 'bot/station-catalog-${{ steps.naming.outputs.utc_date }}-${{ steps.naming.outputs.short_sha }}'
          labels: |
            data-refresh
            train
          add-paths: |
            runtime/data/train/station_catalog.v1.json
            runtime/data/train/station_catalog.meta.json

      - name: No change summary
        if: steps.check.outputs.changed != 'true'
        run: |
          echo "station source hash unchanged; no PR required"
