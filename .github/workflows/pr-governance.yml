name: PR Governance

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governance:
    name: PR Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enforce PR governance contract
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((l) => l.name);
            const body = pr.body || "";

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const docsOnly = files.length > 0 && files.every((f) => f.filename.startsWith("docs/") || f.filename.endsWith(".md"));
            const changedPaths = files.map((f) => f.filename);

            const prefixed = (prefix) => labels.filter((name) => name.startsWith(prefix));
            const typeLabels = prefixed("type:");
            const areaLabels = prefixed("area:");
            const priorityLabels = prefixed("priority:");

            const failures = [];

            if (typeLabels.length !== 1) {
              failures.push(`Exactly one type:* label required (found ${typeLabels.length})`);
            }
            if (areaLabels.length !== 1) {
              failures.push(`Exactly one area:* label required (found ${areaLabels.length})`);
            }
            if (priorityLabels.length !== 1) {
              failures.push(`Exactly one priority:* label required (found ${priorityLabels.length})`);
            }

            const closesIssuePattern = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/ig;
            if (!closesIssuePattern.test(body)) {
              failures.push("PR body must link at least one issue with closing syntax (for example: Closes #123)");
            }

            if (labels.includes("duplicate")) {
              const duplicateReference = /(duplicate of|duplicates|replaces|supersedes)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/i;
              if (!duplicateReference.test(body)) {
                failures.push("duplicate-labeled PRs must include replacement reference text (for example: Duplicate of #123)");
              }
            }

            if (docsOnly) {
              if (!labels.includes("type:documentation")) {
                failures.push("Docs-only PRs must include label type:documentation");
              }
              if (!labels.includes("area:docs")) {
                failures.push("Docs-only PRs must include label area:docs");
              }
            } else {
              if (!changedPaths.includes("CHANGELOG.md")) {
                failures.push("Non-docs PRs must update CHANGELOG.md under ## Unreleased");
              }
            }

            if (failures.length > 0) {
              core.setFailed(failures.join("\n"));
              return;
            }

            core.info(`PR #${pr.number} governance passed. docsOnly=${docsOnly}`);
