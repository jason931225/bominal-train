name: PR Governance

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governance:
    name: PR Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enforce PR governance contract
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map((l) => l.name);
            const body = pr.body || "";

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // Keep docs-only classification in sync with branch-policy-gate.yml.
            const isDocsFile = (name) => name.startsWith("docs/") || (name.endsWith(".md") && !name.startsWith(".github/"));
            const docsOnly = files.length > 0 && files.every((f) => isDocsFile(f.filename));
            const changedPaths = files.map((f) => f.filename);

            const prefixed = (prefix) => labels.filter((name) => name.startsWith(prefix));
            const typeLabels = prefixed("type:");
            const areaLabels = prefixed("area:");
            const priorityLabels = prefixed("priority:");

            const failures = [];

            if (typeLabels.length !== 1) {
              failures.push(`Exactly one type:* label required (found ${typeLabels.length})`);
            }
            if (areaLabels.length !== 1) {
              failures.push(`Exactly one area:* label required (found ${areaLabels.length})`);
            }
            if (priorityLabels.length !== 1) {
              failures.push(`Exactly one priority:* label required (found ${priorityLabels.length})`);
            }

            const closesIssuePattern = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/ig;
            if (!closesIssuePattern.test(body)) {
              failures.push("PR body must link at least one issue with closing syntax (for example: Closes #123)");
            }

            const issueRefs = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:(?<owner>[A-Za-z0-9_.-]+)\/(?<repo>[A-Za-z0-9_.-]+))?#(?<issue>\d+)/ig)]
              .map((m) => ({
                owner: m.groups?.owner || null,
                repo: m.groups?.repo || null,
                issueNumber: Number(m.groups?.issue),
              }))
              .filter((m) => Number.isFinite(m.issueNumber))
              .filter((m) => {
                if (!m.owner || !m.repo) {
                  return true;
                }
                return (
                  m.owner.toLowerCase() === owner.toLowerCase() &&
                  m.repo.toLowerCase() === repo.toLowerCase()
                );
              });

            const issueNumbers = [...new Set(issueRefs.map((m) => m.issueNumber))];
            if (issueNumbers.length === 0) {
              failures.push("PR must close at least one issue from this repository.");
            } else {
              if (issueNumbers.length > 1) {
                core.info(`Multiple linked issues found; label-inheritance check will use #${issueNumbers[0]}.`);
              }

              const primaryIssueNumber = issueNumbers[0];
              const primaryIssue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: primaryIssueNumber,
              });
              const issueLabels = (primaryIssue.data.labels || []).map((label) =>
                typeof label === "string" ? label : label.name
              );

              const singlePrefixedLabel = (names, prefix) => names.filter((name) => name.startsWith(prefix));
              const expectedType = singlePrefixedLabel(issueLabels, "type:");
              const expectedArea = singlePrefixedLabel(issueLabels, "area:");
              const expectedPriority = singlePrefixedLabel(issueLabels, "priority:");

              if (expectedType.length !== 1) {
                failures.push(`Linked issue #${primaryIssueNumber} must carry exactly one type:* label for PR inheritance.`);
              }
              if (expectedArea.length !== 1) {
                failures.push(`Linked issue #${primaryIssueNumber} must carry exactly one area:* label for PR inheritance.`);
              }
              if (expectedPriority.length !== 1) {
                failures.push(`Linked issue #${primaryIssueNumber} must carry exactly one priority:* label for PR inheritance.`);
              }

              if (typeLabels.length === 1 && expectedType.length === 1 && typeLabels[0] !== expectedType[0]) {
                failures.push(`PR type label must inherit from issue #${primaryIssueNumber}: expected ${expectedType[0]}, found ${typeLabels[0]}.`);
              }
              if (areaLabels.length === 1 && expectedArea.length === 1 && areaLabels[0] !== expectedArea[0]) {
                failures.push(`PR area label must inherit from issue #${primaryIssueNumber}: expected ${expectedArea[0]}, found ${areaLabels[0]}.`);
              }
              if (priorityLabels.length === 1 && expectedPriority.length === 1 && priorityLabels[0] !== expectedPriority[0]) {
                failures.push(`PR priority label must inherit from issue #${primaryIssueNumber}: expected ${expectedPriority[0]}, found ${priorityLabels[0]}.`);
              }
            }

            if (labels.includes("duplicate")) {
              const duplicateReference = /(duplicate of|duplicates|replaces|supersedes)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/i;
              if (!duplicateReference.test(body)) {
                failures.push("duplicate-labeled PRs must include replacement reference text (for example: Duplicate of #123)");
              }
            }

            if (docsOnly) {
              if (!labels.includes("type:documentation")) {
                failures.push("Docs-only PRs must include label type:documentation");
              }
              if (!labels.includes("area:docs")) {
                failures.push("Docs-only PRs must include label area:docs");
              }
            } else {
              if (!changedPaths.includes("CHANGELOG.md")) {
                failures.push("Non-docs PRs must update CHANGELOG.md under ## Unreleased");
              }
            }

            if (failures.length > 0) {
              core.setFailed(failures.join("\n"));
              return;
            }

            core.info(`PR #${pr.number} governance passed. docsOnly=${docsOnly}`);
