name: PR Governance

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governance:
    name: PR Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enforce PR governance contract
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title || "";
            const baseRef = pr.base.ref;
            const headRef = pr.head.ref;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // Keep docs-only classification in sync with branch-policy-gate.yml.
            const isDocsFile = (name) => name.startsWith("docs/") || (name.endsWith(".md") && !name.startsWith(".github/"));
            const docsOnly = files.length > 0 && files.every((f) => isDocsFile(f.filename));
            const changedPaths = files.map((f) => f.filename);

            const closesIssuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/ig;
            const closingRefs = [...body.matchAll(closesIssuePattern)].map((m) => m[1]);

            const parseRef = (value) => {
              const [repoPart, issuePart] = value.includes("/") ? value.split("#") : [null, value.slice(1)];
              if (!repoPart) {
                return { owner: null, repo: null, issue: Number(issuePart) };
              }
              const [refOwner, refRepo] = repoPart.split("/");
              return { owner: refOwner, repo: refRepo, issue: Number(issuePart) };
            };

            const linkedIssues = closingRefs
              .map(parseRef)
              .filter((m) => Number.isFinite(m.issue))
              .filter((m) => !m.owner || !m.repo || (
                m.owner.toLowerCase() === owner.toLowerCase() &&
                m.repo.toLowerCase() === repo.toLowerCase()
              ));

            const localIssueNumbers = [...new Set(linkedIssues.map((m) => m.issue))];

            // Promotion PRs are expected to carry forward prior validated changes.
            const isPromotionPair = (
              (headRef === "dev" && baseRef === "staging") ||
              (headRef === "staging" && baseRef === "main") ||
              (headRef === "main" && baseRef === "staging") ||
              (headRef === "staging" && baseRef === "dev")
            );
            const promotionPr = isPromotionPair || title.toLowerCase().startsWith("promote:") || title.toLowerCase().startsWith("backpromote:");

            const failures = [];

            const branchFlowAllowed = (() => {
              if (baseRef === "main") {
                return headRef === "staging" || headRef.startsWith("hotfix/");
              }
              if (baseRef === "staging") {
                return headRef === "dev" || headRef === "main" || headRef.startsWith("hotfix/");
              }
              if (baseRef === "dev") {
                return headRef !== "main";
              }
              return true;
            })();

            if (!branchFlowAllowed) {
              failures.push(`Invalid promotion/branch flow: ${headRef} -> ${baseRef}. Allowed: feature/*->dev, dev->staging, staging->main, hotfix/*->main with back-promotion.`);
            }

            let labels = (pr.labels || []).map((l) => l.name);

            // Auto-inherit type/area/priority from linked issue when missing.
            if (localIssueNumbers.length > 0) {
              const primaryIssue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: localIssueNumbers[0],
              });
              const issueLabels = (primaryIssue.data.labels || []).map((l) => typeof l === "string" ? l : l.name);
              const missingPrefixes = ["type:", "area:", "priority:"]
                .filter((prefix) => !labels.some((name) => name.startsWith(prefix)));
              const inherited = missingPrefixes
                .map((prefix) => issueLabels.find((name) => name.startsWith(prefix)))
                .filter((name) => Boolean(name));

              if (inherited.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: inherited,
                });
                labels = [...new Set([...labels, ...inherited])];
                core.info(`Inherited labels from issue #${localIssueNumbers[0]}: ${inherited.join(", ")}`);
              }
            }

            const prefixed = (prefix) => labels.filter((name) => name.startsWith(prefix));
            const typeLabels = prefixed("type:");
            const areaLabels = prefixed("area:");
            const priorityLabels = prefixed("priority:");

            if (typeLabels.length !== 1) {
              failures.push(`Exactly one type:* label required (found ${typeLabels.length})`);
            }
            if (areaLabels.length !== 1) {
              failures.push(`Exactly one area:* label required (found ${areaLabels.length})`);
            }
            if (priorityLabels.length !== 1) {
              failures.push(`Exactly one priority:* label required (found ${priorityLabels.length})`);
            }

            if (!promotionPr && closingRefs.length === 0) {
              failures.push("PR body must link at least one issue with closing syntax (for example: Closes #123)");
            }

            if (labels.includes("duplicate")) {
              const duplicateReference = /(duplicate of|duplicates|replaces|supersedes)\s+((?:[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+)?#\d+)/i;
              if (!duplicateReference.test(body)) {
                failures.push("duplicate-labeled PRs must include replacement reference text (for example: Duplicate of #123)");
              }
            }

            if (docsOnly) {
              if (!labels.includes("type:documentation")) {
                failures.push("Docs-only PRs must include label type:documentation");
              }
              if (!labels.includes("area:docs")) {
                failures.push("Docs-only PRs must include label area:docs");
              }
            } else if (!promotionPr) {
              if (!changedPaths.includes("CHANGELOG.md")) {
                failures.push("Non-docs PRs must update CHANGELOG.md under ## Unreleased");
              }
            }

            if (failures.length > 0) {
              core.setFailed(failures.join("\n"));
              return;
            }

            core.info(`PR #${pr.number} governance passed. docsOnly=${docsOnly} promotionPr=${promotionPr} base=${baseRef} head=${headRef}`);
