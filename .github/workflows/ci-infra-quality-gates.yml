name: CI - Infra Quality Gates

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "docs/**"
      - "AGENTS.md"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "docs/**"
      - "AGENTS.md"
      - ".github/workflows/**"

concurrency:
  group: ci-infra-quality-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  infra-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # - name: Run infra tests
      #   run: |
      #     python3 -m unittest discover -s infra/tests -p 'test_*.py'

      - name: Install web test dependencies
        run: |
          npm ci --prefix web

      - name: Dependency vulnerability scan (Python)
        run: |
          python3 -m pip install --upgrade pip pip-audit
          pip-audit -r api/requirements-prod.txt --strict
          pip-audit -r api/requirements.txt --strict

      - name: Dependency vulnerability scan (Web production deps)
        run: |
          npm audit --prefix web --omit=dev --audit-level=high

      # - name: Run web unit tests
      #   run: |
      #     npm run --prefix web test:ci

      # - name: Assertive test checks (API + web)
      #   run: |
      #     python3 infra/scripts/check_assertive_tests.py api/tests
      #     node infra/scripts/check_assertive_tests_web.mjs web

      - name: Install API test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r api/requirements.txt

      # - name: Run API mutation gate
      #   run: |
      #     bash infra/scripts/run_mutation_api.sh

      # - name: Run web mutation smoke gate
      #   run: |
      #     npm run --prefix web test:mutation

      - name: Validate docs pointer library
        run: |
          bash infra/tests/test_docs_pointers.sh

      - name: Validate audience-split docs layout
        run: |
          bash infra/tests/test_docs_audience_split.sh

      - name: Validate changelog structure
        run: |
          bash infra/tests/test_changelog.sh

      - name: Validate env utility helpers
        run: |
          bash infra/tests/test_env_utils.sh

      - name: Validate train task list benchmark script
        run: |
          bash infra/tests/test_benchmark_train_task_list.sh

      - name: Validate train task list benchmark compare scripts
        run: |
          bash infra/tests/test_benchmark_train_task_list_compare.sh

      - name: Validate local DB reset script
        run: |
          bash infra/tests/test_reset_local_db.sh

      - name: Validate deprecation registry policy
        run: |
          bash infra/tests/test_deprecation_policy.sh

      - name: Validate deprecation references
        run: |
          bash infra/tests/test_deprecation_references.sh

      - name: Validate predeploy env checks
        run: |
          bash infra/tests/test_predeploy_check.sh

      - name: Validate changed-image rolling deploy path
        run: |
          bash infra/tests/test_deploy_changed_image_rollout.sh

      - name: Validate intent routing
        run: |
          bash infra/tests/test_intent_routing.sh

      - name: Validate docs consistency
        run: |
          bash infra/tests/test_docs_consistency.sh

      - name: Validate sensitive log scanner
        run: |
          bash infra/tests/test_sensitive_log_scan.sh

      - name: Validate egress Caddyfile guards
        run: |
          bash infra/tests/test_egress_caddyfiles.sh

      - name: Validate worker runtime guards
        run: |
          bash infra/tests/test_worker_runtime_guards.sh

      - name: Validate web Chromium dependency split
        run: |
          bash infra/tests/test_web_chromium_dependency_split.sh

      - name: Validate semantic version mapping
        run: |
          bash infra/tests/test_versioning.sh

      - name: Validate assertive-check scripts
        run: |
          bash infra/tests/test_assertive_checks.sh
