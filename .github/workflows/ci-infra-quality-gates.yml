name: CI - Infra Quality Gates

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "docs/**"
      - "AGENTS.md"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "docs/**"
      - "AGENTS.md"
      - ".github/workflows/**"

concurrency:
  group: ci-infra-quality-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    if: vars.CI_ALLOW_POLICY_GATES_BYPASS != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  infra-tests:
    if: vars.CI_ALLOW_POLICY_GATES_BYPASS != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect change scope for quality gates
        id: change_scope
        shell: bash
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          head_sha="${{ github.sha }}"
          base_sha=""

          if [[ "$event_name" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
          fi

          if ! git cat-file -e "${head_sha}^{commit}" >/dev/null 2>&1; then
            head_sha="${{ github.sha }}"
          fi
          if [[ -n "$base_sha" ]] && ! git cat-file -e "${base_sha}^{commit}" >/dev/null 2>&1; then
            base_sha=""
          fi

          changed_file_list="$(mktemp)"
          if [[ -n "$base_sha" ]]; then
            git diff --name-only "$base_sha" "$head_sha" > "$changed_file_list"
          else
            git show --pretty='' --name-only "$head_sha" > "$changed_file_list"
          fi

          changed_api=false
          if grep -qE '^api/' "$changed_file_list"; then
            changed_api=true
          fi

          changed_web=false
          if grep -qE '^web/' "$changed_file_list"; then
            changed_web=true
          fi

          changed_api_or_web=false
          if grep -qE '^(api|web)/' "$changed_file_list"; then
            changed_api_or_web=true
          fi

          critical_path_changed=false
          critical_pattern='^(api/app/core/crypto/|api/app/core/(security|supabase_jwt)\.py$|api/app/http/deps\.py$|api/app/http/routes/(auth|wallet)\.py$|api/app/services/(auth|identity|passkeys|wallet)\.py$|api/app/modules/train/(service|worker)\.py$|api/app/modules/train/providers/|infra/scripts/(deploy|gha-deploy|predeploy-check)\.sh$|infra/tests/test_deploy.*\.sh$|\.github/workflows/cd-deploy-production\.yml$)'
          if grep -qE "$critical_pattern" "$changed_file_list"; then
            critical_path_changed=true
          fi

          critical_api_web_path_changed=false
          critical_api_web_pattern='^(api/app/core/crypto/|api/app/core/(security|supabase_jwt)\.py$|api/app/http/deps\.py$|api/app/http/routes/(auth|wallet)\.py$|api/app/services/(auth|identity|passkeys|wallet)\.py$|api/app/modules/train/(service|worker)\.py$|api/app/modules/train/providers/|web/)'
          if grep -qE "$critical_api_web_pattern" "$changed_file_list"; then
            critical_api_web_path_changed=true
          fi

          changed_file_count="$(wc -l < "$changed_file_list" | tr -d ' ')"
          echo "changed_api=$changed_api" >> "$GITHUB_OUTPUT"
          echo "changed_web=$changed_web" >> "$GITHUB_OUTPUT"
          echo "changed_api_or_web=$changed_api_or_web" >> "$GITHUB_OUTPUT"
          echo "critical_path_changed=$critical_path_changed" >> "$GITHUB_OUTPUT"
          echo "critical_api_web_path_changed=$critical_api_web_path_changed" >> "$GITHUB_OUTPUT"
          echo "changed_file_count=$changed_file_count" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        if: steps.change_scope.outputs.changed_api_or_web == 'true'
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Run infra tests
        run: |
          python3 -m unittest discover -s infra/tests -p 'test_*.py'

      - name: Install web test dependencies
        if: steps.change_scope.outputs.changed_api_or_web == 'true'
        run: |
          npm ci --prefix web

      - name: Dependency vulnerability scan (Python)
        if: steps.change_scope.outputs.changed_api == 'true'
        run: |
          python3 -m pip install --upgrade pip pip-audit
          pip-audit -r api/requirements-prod.txt --strict
          pip-audit -r api/requirements.txt --strict

      - name: Dependency vulnerability scan (Web production deps)
        if: steps.change_scope.outputs.changed_api_or_web == 'true'
        run: |
          npm audit --prefix web --omit=dev --audit-level=high

      - name: Run web unit tests
        if: steps.change_scope.outputs.changed_api_or_web == 'true'
        run: |
          npm run --prefix web test:ci

      - name: Assertive test checks (API + web)
        if: steps.change_scope.outputs.critical_api_web_path_changed == 'true'
        run: |
          python3 infra/scripts/check_assertive_tests.py api/tests
          node infra/scripts/check_assertive_tests_web.mjs web

      - name: Install API test dependencies
        if: steps.change_scope.outputs.critical_api_web_path_changed == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r api/requirements.txt

      - name: Run API mutation gate
        if: steps.change_scope.outputs.critical_api_web_path_changed == 'true'
        run: |
          bash infra/scripts/run_mutation_api.sh

      - name: Run web mutation smoke gate
        if: steps.change_scope.outputs.critical_api_web_path_changed == 'true'
        run: |
          npm run --prefix web test:mutation

      - name: Validate docs pointer library
        run: |
          bash infra/tests/test_docs_pointers.sh

      - name: Validate audience-split docs layout
        run: |
          bash infra/tests/test_docs_audience_split.sh

      - name: Validate changelog structure
        run: |
          bash infra/tests/test_changelog.sh

      - name: Validate env utility helpers
        run: |
          bash infra/tests/test_env_utils.sh

      - name: Validate train task list benchmark script
        run: |
          bash infra/tests/test_benchmark_train_task_list.sh

      - name: Validate train task list benchmark compare scripts
        run: |
          bash infra/tests/test_benchmark_train_task_list_compare.sh

      - name: Validate local DB reset script
        run: |
          bash infra/tests/test_reset_local_db.sh

      - name: Validate local cleanup script
        run: |
          bash infra/tests/test_local_cleanup.sh

      - name: Validate local-run cleanup behavior
        run: |
          bash infra/tests/test_local_run_cleanup.sh

      - name: Validate deprecation registry policy
        run: |
          bash infra/tests/test_deprecation_policy.sh

      - name: Validate deprecation references
        run: |
          bash infra/tests/test_deprecation_references.sh

      - name: Validate predeploy env checks
        run: |
          bash infra/tests/test_predeploy_check.sh

      - name: Validate GSM master-key setup scripts
        run: |
          bash infra/tests/test_setup_gsm_master_key.sh

      - name: Validate Supabase auth template sync script
        run: |
          bash infra/tests/test_sync_supabase_auth_templates.sh

      - name: Validate edge secret sync script
        run: |
          bash infra/tests/test_sync_edge_secrets_from_gsm.sh

      - name: Validate free-tier status report script
        run: |
          bash infra/tests/test_free_tier_status_report.sh

      - name: Validate uv API venv bootstrap script
        run: |
          bash infra/tests/test_ensure_uv_api_venv.sh

      - name: Validate changed-image rolling deploy path
        run: |
          bash infra/tests/test_deploy_changed_image_rollout.sh

      - name: Validate deploy Docker cleanup controls
        run: |
          bash infra/tests/test_deploy_cleanup.sh

      - name: Validate intent routing
        run: |
          bash infra/tests/test_intent_routing.sh

      - name: Validate docs consistency
        run: |
          bash infra/tests/test_docs_consistency.sh

      - name: Validate docs security-section duplication guard
        run: |
          bash infra/tests/test_docs_no_duplicate_security_sections.sh

      - name: Validate policy/runtime parity contracts
        run: |
          bash infra/tests/test_policy_runtime_parity.sh

      - name: Validate secret residency contracts
        run: |
          bash infra/tests/test_secret_residency_contract.sh

      - name: Validate CI/CD workflow efficiency policies
        run: |
          bash infra/tests/test_ci_cd_workflow_efficiency.sh

      - name: Validate sensitive log scanner
        run: |
          bash infra/tests/test_sensitive_log_scan.sh

      - name: Validate payment boundary regressions
        run: |
          bash infra/tests/test_payment_boundary_regressions.sh

      - name: Validate egress Caddyfile guards
        run: |
          bash infra/tests/test_egress_caddyfiles.sh

      - name: Validate worker runtime guards
        run: |
          bash infra/tests/test_worker_runtime_guards.sh

      - name: Validate web Chromium dependency split
        run: |
          bash infra/tests/test_web_chromium_dependency_split.sh

      - name: Validate semantic version mapping
        run: |
          bash infra/tests/test_versioning.sh

      - name: Validate assertive-check scripts
        run: |
          bash infra/tests/test_assertive_checks.sh

      - name: Summarize quality-gate scope
        if: always()
        shell: bash
        run: |
          {
            echo "### CI Infra Quality Gates Scope"
            echo "- Changed files: \`${{ steps.change_scope.outputs.changed_file_count }}\`"
            echo "- API changed: \`${{ steps.change_scope.outputs.changed_api }}\`"
            echo "- Web changed: \`${{ steps.change_scope.outputs.changed_web }}\`"
            echo "- API/Web changed: \`${{ steps.change_scope.outputs.changed_api_or_web }}\`"
            echo "- Critical-path changed: \`${{ steps.change_scope.outputs.critical_path_changed }}\`"
            echo "- Critical API/Web path changed: \`${{ steps.change_scope.outputs.critical_api_web_path_changed }}\`"
            if [[ "${{ steps.change_scope.outputs.changed_api_or_web }}" == "true" ]]; then
              echo "- Baseline web tests: ran"
            else
              echo "- Baseline web tests: skipped (no API/web changes)"
            fi
            if [[ "${{ steps.change_scope.outputs.critical_api_web_path_changed }}" == "true" ]]; then
              echo "- Critical gates (assertive + mutation): ran"
            else
              echo "- Critical gates (assertive + mutation): skipped (no critical API/web boundary changes)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  policy-gates-bypass:
    if: vars.CI_ALLOW_POLICY_GATES_BYPASS == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge policy gate bypass
        run: |
          echo "CI policy gates bypassed via CI_ALLOW_POLICY_GATES_BYPASS=true."
