name: CD

on:
  push:
    branches:
      - main
    paths:
      - runtime/**
      - env/prod/**
      - .github/workflows/cd.yml
      - '!**/*.md'
      - '!docs/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: Run production deploy after publishing images
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/bominal-api
  WORKER_IMAGE_NAME: ${{ github.repository_owner }}/bominal-worker

jobs:
  build-and-publish:
    name: Build, Sign, and Publish Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      api_image_ref: ${{ steps.refs.outputs.api_image_ref }}
      worker_image_ref: ${{ steps.refs.outputs.worker_image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract worker image metadata
        id: meta-worker
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runtime
          file: runtime/Dockerfile.api
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.meta-api.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        id: build-worker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runtime
          file: runtime/Dockerfile.worker
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.meta-worker.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest API image provenance
        if: vars.CD_ENABLE_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Attest worker image provenance
        if: vars.CD_ENABLE_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}
          subject-digest: ${{ steps.build-worker.outputs.digest }}
          push-to-registry: true

      - name: Attestation policy note
        if: vars.CD_ENABLE_ATTESTATIONS != 'true'
        run: |
          echo "Image attestation is disabled by policy (CD_ENABLE_ATTESTATIONS != 'true')."
          echo "Enable repository variable CD_ENABLE_ATTESTATIONS=true once attestation is available for this repository."

      - name: Publish image refs
        id: refs
        run: |
          echo "api_image_ref=${REGISTRY}/${API_IMAGE_NAME}@${{ steps.build-api.outputs.digest }}" >> "${GITHUB_OUTPUT}"
          echo "worker_image_ref=${REGISTRY}/${WORKER_IMAGE_NAME}@${{ steps.build-worker.outputs.digest }}" >> "${GITHUB_OUTPUT}"

  deploy-production:
    name: Deploy Production
    if: >
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.deploy) ||
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.AUTO_DEPLOY_MAIN == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-and-publish
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate deployment variables
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
          CLOUDRUN_API_SERVICE_ACCOUNT: ${{ vars.CLOUDRUN_API_SERVICE_ACCOUNT }}
          CLOUDRUN_API_VPC_NETWORK: ${{ vars.CLOUDRUN_API_VPC_NETWORK }}
          CLOUDRUN_API_VPC_SUBNET: ${{ vars.CLOUDRUN_API_VPC_SUBNET }}
          CLOUDRUN_API_VPC_NETWORK_TAGS: ${{ vars.CLOUDRUN_API_VPC_NETWORK_TAGS }}
          USER_APP_HOST: ${{ vars.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ vars.ADMIN_APP_HOST }}
          SESSION_COOKIE_DOMAIN: ${{ vars.SESSION_COOKIE_DOMAIN }}
          INVITE_BASE_URL: ${{ vars.INVITE_BASE_URL }}
          EMAIL_FROM_ADDRESS: ${{ vars.EMAIL_FROM_ADDRESS }}
          WEBAUTHN_RP_ID: ${{ vars.WEBAUTHN_RP_ID }}
          WEBAUTHN_RP_ORIGIN: ${{ vars.WEBAUTHN_RP_ORIGIN }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_SCRIPT_PATH: ${{ vars.DEPLOY_SCRIPT_PATH }}
          DEPLOY_HEALTHCHECK_SCRIPT_PATH: ${{ vars.DEPLOY_HEALTHCHECK_SCRIPT_PATH }}
          DEPLOY_ROLLBACK_SCRIPT_PATH: ${{ vars.DEPLOY_ROLLBACK_SCRIPT_PATH }}
          VM_SECRET_ENV_FILE: ${{ vars.VM_SECRET_ENV_FILE }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_MIGRATIONS_DIR: ${{ vars.DEPLOY_MIGRATIONS_DIR }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_VM_BASELINE_SCRIPT: ${{ vars.DEPLOY_VM_BASELINE_SCRIPT }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_DELAY_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_DELAY_SECONDS }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            ARTIFACT_REGISTRY_REPOSITORY \
            CLOUDRUN_API_SERVICE \
            CLOUDRUN_API_SERVICE_ACCOUNT \
            CLOUDRUN_API_VPC_NETWORK \
            CLOUDRUN_API_VPC_SUBNET \
            USER_APP_HOST \
            ADMIN_APP_HOST \
            SESSION_COOKIE_DOMAIN \
            INVITE_BASE_URL \
            EMAIL_FROM_ADDRESS \
            WEBAUTHN_RP_ID \
            WEBAUTHN_RP_ORIGIN \
            DEPLOY_VM_NAME \
            DEPLOY_VM_ZONE \
            DEPLOY_WORKDIR \
            DEPLOY_SCRIPT_PATH \
            DEPLOY_HEALTHCHECK_SCRIPT_PATH \
            DEPLOY_ROLLBACK_SCRIPT_PATH \
            VM_SECRET_ENV_FILE \
            DEPLOY_RUNTIME_ENV_FILE \
            DEPLOY_COMPOSE_FILE \
            DEPLOY_MIGRATIONS_DIR \
            DEPLOY_WORKER_SERVICE \
            POSTGRES_HOST \
            POSTGRES_PORT \
            POSTGRES_DB \
            POSTGRES_USER; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository/environment variable '${name}'"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          for path_like in \
            DEPLOY_WORKDIR \
            DEPLOY_SCRIPT_PATH \
            DEPLOY_HEALTHCHECK_SCRIPT_PATH \
            DEPLOY_ROLLBACK_SCRIPT_PATH \
            VM_SECRET_ENV_FILE \
            DEPLOY_RUNTIME_ENV_FILE \
            DEPLOY_COMPOSE_FILE \
            DEPLOY_MIGRATIONS_DIR; do
            value="${!path_like}"
            if ! [[ "${value}" =~ ^/[A-Za-z0-9._/-]+$ ]]; then
              echo "::error::${path_like} must be an absolute safe path (no spaces)"
              exit 1
            fi
            if [[ "${value}" == *".."* ]]; then
              echo "::error::${path_like} must not contain path traversal segments"
              exit 1
            fi
          done
          for optional_path in DEPLOY_ROLLBACK_STATE_PATH DEPLOY_VM_BASELINE_SCRIPT; do
            value="${!optional_path:-}"
            if [ -z "${value}" ]; then
              continue
            fi
            if ! [[ "${value}" =~ ^/[A-Za-z0-9._/-]+$ ]]; then
              echo "::error::${optional_path} must be an absolute safe path (no spaces)"
              exit 1
            fi
            if [[ "${value}" == *".."* ]]; then
              echo "::error::${optional_path} must not contain path traversal segments"
              exit 1
            fi
          done
          if [ -n "${DEPLOY_COMPOSE_PROJECT_NAME:-}" ] && ! [[ "${DEPLOY_COMPOSE_PROJECT_NAME}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::DEPLOY_COMPOSE_PROJECT_NAME must match ^[A-Za-z0-9._-]+$"
            exit 1
          fi
          if [ -n "${DEPLOY_HEALTHCHECK_RETRIES:-}" ] && ! [[ "${DEPLOY_HEALTHCHECK_RETRIES}" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_HEALTHCHECK_RETRIES must be numeric"
            exit 1
          fi
          if [ -n "${DEPLOY_HEALTHCHECK_DELAY_SECONDS:-}" ] && ! [[ "${DEPLOY_HEALTHCHECK_DELAY_SECONDS}" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_HEALTHCHECK_DELAY_SECONDS must be numeric"
            exit 1
          fi
          if ! [[ "${POSTGRES_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::POSTGRES_PORT must be numeric"
            exit 1
          fi

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Capture current Cloud Run revision
        id: previous-cloudrun
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
        run: |
          set -euo pipefail
          if gcloud run services describe "${CLOUDRUN_API_SERVICE}" --region "${GCP_REGION}" >/dev/null 2>&1; then
            prev_revision="$(gcloud run services describe "${CLOUDRUN_API_SERVICE}" --region "${GCP_REGION}" --format='value(status.latestReadyRevisionName)')"
          else
            prev_revision=""
          fi
          echo "prev_revision=${prev_revision}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Artifact Registry Docker auth
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Publish API image to Artifact Registry
        id: api-artifact
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
          SOURCE_API_IMAGE: ${{ needs.build-and-publish.outputs.api_image_ref }}
        run: |
          set -euo pipefail
          artifact_image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/bominal-api:${GITHUB_SHA}"
          docker pull "${SOURCE_API_IMAGE}"
          docker tag "${SOURCE_API_IMAGE}" "${artifact_image}"
          docker push "${artifact_image}"
          echo "api_image=${artifact_image}" >> "${GITHUB_OUTPUT}"

      - name: Render Cloud Run service definition
        id: render-cloudrun
        env:
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
          CLOUDRUN_API_IMAGE: ${{ steps.api-artifact.outputs.api_image }}
          CLOUDRUN_API_SERVICE_ACCOUNT: ${{ vars.CLOUDRUN_API_SERVICE_ACCOUNT }}
          CLOUDRUN_API_VPC_NETWORK: ${{ vars.CLOUDRUN_API_VPC_NETWORK }}
          CLOUDRUN_API_VPC_SUBNET: ${{ vars.CLOUDRUN_API_VPC_SUBNET }}
          CLOUDRUN_API_VPC_NETWORK_TAGS: ${{ vars.CLOUDRUN_API_VPC_NETWORK_TAGS }}
          USER_APP_HOST: ${{ vars.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ vars.ADMIN_APP_HOST }}
          SESSION_COOKIE_DOMAIN: ${{ vars.SESSION_COOKIE_DOMAIN }}
          INVITE_BASE_URL: ${{ vars.INVITE_BASE_URL }}
          EMAIL_FROM_ADDRESS: ${{ vars.EMAIL_FROM_ADDRESS }}
          WEBAUTHN_RP_ID: ${{ vars.WEBAUTHN_RP_ID }}
          WEBAUTHN_RP_ORIGIN: ${{ vars.WEBAUTHN_RP_ORIGIN }}
        run: |
          set -euo pipefail
          rendered_service="${RUNNER_TEMP}/bominal-api-service.yaml"
          cp runtime/cloudrun/api/service.yaml "${rendered_service}"

          network_interfaces="$(printf '[{\"network\":\"%s\",\"subnetwork\":\"%s\"' "${CLOUDRUN_API_VPC_NETWORK}" "${CLOUDRUN_API_VPC_SUBNET}")"
          if [ -n "${CLOUDRUN_API_VPC_NETWORK_TAGS:-}" ]; then
            network_interfaces="$(printf '%s,\"tags\":\"%s\"' "${network_interfaces}" "${CLOUDRUN_API_VPC_NETWORK_TAGS}")"
          fi
          network_interfaces="${network_interfaces}}]"
          export CLOUDRUN_NETWORK_INTERFACES="${network_interfaces}"

          perl -0pi -e '
            s#__CLOUDRUN_API_SERVICE__#$ENV{CLOUDRUN_API_SERVICE}#g;
            s#__CLOUDRUN_API_IMAGE__#$ENV{CLOUDRUN_API_IMAGE}#g;
            s#__CLOUDRUN_API_SERVICE_ACCOUNT__#$ENV{CLOUDRUN_API_SERVICE_ACCOUNT}#g;
            s#__CLOUDRUN_NETWORK_INTERFACES__#$ENV{CLOUDRUN_NETWORK_INTERFACES}#g;
            s#__USER_APP_HOST__#$ENV{USER_APP_HOST}#g;
            s#__ADMIN_APP_HOST__#$ENV{ADMIN_APP_HOST}#g;
            s#__SESSION_COOKIE_DOMAIN__#$ENV{SESSION_COOKIE_DOMAIN}#g;
            s#__INVITE_BASE_URL__#$ENV{INVITE_BASE_URL}#g;
            s#__EMAIL_FROM_ADDRESS__#$ENV{EMAIL_FROM_ADDRESS}#g;
            s#__WEBAUTHN_RP_ID__#$ENV{WEBAUTHN_RP_ID}#g;
            s#__WEBAUTHN_RP_ORIGIN__#$ENV{WEBAUTHN_RP_ORIGIN}#g;
          ' "${rendered_service}"

          echo "service_path=${rendered_service}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Cloud Run API service
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          SERVICE_PATH: ${{ steps.render-cloudrun.outputs.service_path }}
        run: |
          set -euo pipefail
          gcloud run services replace "${SERVICE_PATH}" --region "${GCP_REGION}"

      - name: Allow unauthenticated Cloud Run invocations
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
        run: |
          set -euo pipefail
          gcloud run services add-iam-policy-binding "${CLOUDRUN_API_SERVICE}" \
            --region "${GCP_REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker"

      - name: Resolve Cloud Run service URL
        id: cloudrun-url
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
        run: |
          set -euo pipefail
          service_url="$(gcloud run services describe "${CLOUDRUN_API_SERVICE}" --region "${GCP_REGION}" --format='value(status.url)')"
          if [ -z "${service_url}" ]; then
            echo "::error::Cloud Run service URL was empty"
            exit 1
          fi
          echo "service_url=${service_url}" >> "${GITHUB_OUTPUT}"

      - name: Smoke test Cloud Run API
        id: smoke-cloudrun
        env:
          CLOUDRUN_SERVICE_URL: ${{ steps.cloudrun-url.outputs.service_url }}
        run: |
          set -euo pipefail
          curl -fsS --retry 10 --retry-delay 3 --retry-all-errors "${CLOUDRUN_SERVICE_URL}/health" >/dev/null
          curl -fsS --retry 10 --retry-delay 3 --retry-all-errors "${CLOUDRUN_SERVICE_URL}/ready" >/dev/null

      - name: Roll back Cloud Run after failed smoke test
        if: failure() && steps.smoke-cloudrun.outcome == 'failure' && steps.previous-cloudrun.outputs.prev_revision != ''
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUDRUN_API_SERVICE: ${{ vars.CLOUDRUN_API_SERVICE }}
          PREVIOUS_REVISION: ${{ steps.previous-cloudrun.outputs.prev_revision }}
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${CLOUDRUN_API_SERVICE}" \
            --region "${GCP_REGION}" \
            --to-revisions "${PREVIOUS_REVISION}=100"

      - name: Run remote deploy script
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_SCRIPT_PATH: ${{ vars.DEPLOY_SCRIPT_PATH }}
          VM_SECRET_ENV_FILE: ${{ vars.VM_SECRET_ENV_FILE }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_MIGRATIONS_DIR: ${{ vars.DEPLOY_MIGRATIONS_DIR }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_VM_BASELINE_SCRIPT: ${{ vars.DEPLOY_VM_BASELINE_SCRIPT }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          WORKER_IMAGE: ${{ needs.build-and-publish.outputs.worker_image_ref }}
        run: |
          set -euo pipefail
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_WORKER_IMAGE=%q; export BOMINAL_POSTGRES_HOST=%q; export BOMINAL_POSTGRES_PORT=%q; export BOMINAL_POSTGRES_DB=%q; export BOMINAL_POSTGRES_USER=%q; export BOMINAL_VM_SECRET_ENV_FILE=%q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_MIGRATIONS_DIR=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_ROLLBACK_STATE_PATH=%q; export BOMINAL_VM_BASELINE_SCRIPT=%q; export BOMINAL_WORKER_SERVICE=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${WORKER_IMAGE}" \
            "${POSTGRES_HOST}" \
            "${POSTGRES_PORT}" \
            "${POSTGRES_DB}" \
            "${POSTGRES_USER}" \
            "${VM_SECRET_ENV_FILE}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_MIGRATIONS_DIR}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_ROLLBACK_STATE_PATH}" \
            "${DEPLOY_VM_BASELINE_SCRIPT}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${DEPLOY_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"

      - name: Run remote health check script
        id: healthcheck
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_HEALTHCHECK_SCRIPT_PATH: ${{ vars.DEPLOY_HEALTHCHECK_SCRIPT_PATH }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
          CLOUDRUN_SERVICE_URL: ${{ steps.cloudrun-url.outputs.service_url }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_DELAY_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_DELAY_SECONDS }}
        run: |
          set -euo pipefail
          live_url="${CLOUDRUN_SERVICE_URL}/health"
          ready_url="${CLOUDRUN_SERVICE_URL}/ready"
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_WORKER_SERVICE=%q; export BOMINAL_HEALTHCHECK_LIVE_URL=%q; export BOMINAL_HEALTHCHECK_READY_URL=%q; export BOMINAL_HEALTHCHECK_RETRIES=%q; export BOMINAL_HEALTHCHECK_DELAY_SECONDS=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${live_url}" \
            "${ready_url}" \
            "${DEPLOY_HEALTHCHECK_RETRIES}" \
            "${DEPLOY_HEALTHCHECK_DELAY_SECONDS}" \
            "${DEPLOY_HEALTHCHECK_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"

      - name: Roll back on failed health check
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          DEPLOY_VM_NAME: ${{ vars.DEPLOY_VM_NAME }}
          DEPLOY_VM_ZONE: ${{ vars.DEPLOY_VM_ZONE }}
          DEPLOY_WORKDIR: ${{ vars.DEPLOY_WORKDIR }}
          DEPLOY_ROLLBACK_SCRIPT_PATH: ${{ vars.DEPLOY_ROLLBACK_SCRIPT_PATH }}
          DEPLOY_RUNTIME_ENV_FILE: ${{ vars.DEPLOY_RUNTIME_ENV_FILE }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME }}
          DEPLOY_ROLLBACK_STATE_PATH: ${{ vars.DEPLOY_ROLLBACK_STATE_PATH }}
          DEPLOY_WORKER_SERVICE: ${{ vars.DEPLOY_WORKER_SERVICE }}
        run: |
          set -euo pipefail
          printf -v remote_command \
            'set -euo pipefail; cd %q; export BOMINAL_RUNTIME_ENV_PATH=%q; export BOMINAL_COMPOSE_FILE=%q; export BOMINAL_COMPOSE_PROJECT_NAME=%q; export BOMINAL_ROLLBACK_STATE_PATH=%q; export BOMINAL_WORKER_SERVICE=%q; %q' \
            "${DEPLOY_WORKDIR}" \
            "${DEPLOY_RUNTIME_ENV_FILE}" \
            "${DEPLOY_COMPOSE_FILE}" \
            "${DEPLOY_COMPOSE_PROJECT_NAME}" \
            "${DEPLOY_ROLLBACK_STATE_PATH}" \
            "${DEPLOY_WORKER_SERVICE}" \
            "${DEPLOY_ROLLBACK_SCRIPT_PATH}"

          gcloud compute ssh "${DEPLOY_VM_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${DEPLOY_VM_ZONE}" \
            --tunnel-through-iap \
            --command "${remote_command}"
