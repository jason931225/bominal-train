name: Infra Tests

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra-tests.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-tests.yml"

permissions:
  contents: read

jobs:
  infra-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run infra tests
        run: |
          python3 -m unittest discover -s infra/tests -p 'test_*.py'

