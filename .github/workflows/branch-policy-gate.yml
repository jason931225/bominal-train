name: Branch Policy Gate

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: branch-policy-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Branch Policy Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Enforce CI-gated merge policy
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;

            const requiredChecks = [
              "Workflow Lint",
              "PR Governance",
              "Frontend Artifact Policy",
              "Script Quality",
              "Secret Scan",
              "Rust Quality Gates",
              "Rust Coverage Gate",
            ];

            const optionalIfPresent = [
              "Dependency Review",
              "Frontend Asset Gate",
              "Station Catalog Snapshot Validation",
            ];

            // Keep docs-only classification in sync with pr-governance.yml and ci.yml path ignores.
            const isDocsFile = (path) => path.startsWith("docs/") || path.endsWith(".md");

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const docsOnly = files.length > 0 && files.every((f) => isDocsFile(f.filename));
            core.info(`PR #${pr.number} files=${files.length} docsOnly=${docsOnly}`);

            if (docsOnly) {
              core.info("Docs-only PR detected; passing gate without CI job enforcement.");
              return;
            }

            const maxMinutes = 30;
            const intervalSeconds = 20;
            const deadlineMs = Date.now() + maxMinutes * 60 * 1000;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const latestByName = (runs) => {
              const map = new Map();
              for (const run of runs) {
                const prev = map.get(run.name);
                if (!prev || run.id > prev.id) {
                  map.set(run.name, run);
                }
              }
              return map;
            };

            while (true) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const runs = response.data.check_runs || [];
              const byName = latestByName(runs);
              byName.delete("Branch Policy Gate");

              const missing = [];
              const pending = [];
              const failed = [];

              for (const name of requiredChecks) {
                const run = byName.get(name);
                if (!run) {
                  missing.push(name);
                  continue;
                }

                if (run.status !== "completed") {
                  pending.push(name);
                  continue;
                }

                if (run.conclusion !== "success") {
                  failed.push(`${name}=${run.conclusion}`);
                }
              }

              for (const name of optionalIfPresent) {
                const run = byName.get(name);
                if (!run) {
                  continue;
                }

                if (run.status !== "completed") {
                  pending.push(name);
                  continue;
                }

                if (!["success", "skipped", "neutral"].includes(run.conclusion)) {
                  failed.push(`${name}=${run.conclusion}`);
                }
              }

              if (failed.length > 0) {
                core.setFailed(`CI checks failed: ${failed.join(", ")}`);
                return;
              }

              if (missing.length === 0 && pending.length === 0) {
                core.info("All required CI checks are present and successful.");
                return;
              }

              if (Date.now() > deadlineMs) {
                const parts = [];
                if (missing.length > 0) {
                  parts.push(`missing=[${missing.join(", ")}]`);
                }
                if (pending.length > 0) {
                  parts.push(`pending=[${pending.join(", ")}]`);
                }
                core.setFailed(`Timed out waiting for CI checks: ${parts.join(" ")}`);
                return;
              }

              if (missing.length > 0) {
                core.info(`Waiting for required checks to appear: ${missing.join(", ")}`);
              }
              if (pending.length > 0) {
                core.info(`Waiting for checks to complete: ${pending.join(", ")}`);
              }

              await sleep(intervalSeconds * 1000);
            }
