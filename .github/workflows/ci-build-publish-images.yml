name: CI - Build and Publish Images

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "docs/releases/**"
      - "infra/scripts/version_guard.py"
      - ".github/workflows/ci-build-publish-images.yml"
  workflow_dispatch:
    inputs:
      build_api:
        description: "Build and publish API image"
        required: true
        default: true
        type: boolean
      build_web:
        description: "Build and publish web image"
        required: true
        default: true
        type: boolean

concurrency:
  group: ci-build-publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/bominal/web

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/ci-build-publish-images.yml'
            web:
              - 'web/**'
              - 'docs/releases/**'
              - 'infra/scripts/version_guard.py'
              - '.github/workflows/ci-build-publish-images.yml'

  build-api:
    name: Build API Image
    needs: changes
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.build_api == 'true'
      ) ||
      (
        github.event_name != 'workflow_dispatch' &&
        needs.changes.outputs.api == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: mode=max
          sbom: true
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.API_IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  build-web:
    name: Build Web Image
    needs: changes
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.build_web == 'true'
      ) ||
      (
        github.event_name != 'workflow_dispatch' &&
        needs.changes.outputs.web == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve app version
        id: app_version
        run: |
          resolved="$(python3 infra/scripts/version_guard.py resolve --commit "$GITHUB_SHA")"
          numeric="${resolved#v}"
          numeric="${numeric%%-*}"
          numeric="${numeric%%+*}"
          echo "app_version=$numeric" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: $resolved"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Web image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            APP_VERSION=${{ steps.app_version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: mode=max
          sbom: true
      - name: Scan Web image (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.WEB_IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
