labels:
  - name: "type:bug"
    color: "d73a4a"
    description: "Defect correction or regression fix"
  - name: "type:enhancement"
    color: "a2eeef"
    description: "New feature or behavior expansion"
  - name: "type:documentation"
    color: "0075ca"
    description: "Documentation-only or policy-doc changes"
  - name: "type:chore"
    color: "bfdadc"
    description: "Maintenance, cleanup, or tooling chores"
  - name: "type:security"
    color: "b60205"
    description: "Security boundary, auth, secret, or hardening work"
  - name: "type:ops"
    color: "5319e7"
    description: "Operational incident, deploy, or production runbook work"

  - name: "area:runtime-api"
    color: "1d76db"
    description: "runtime/crates/api scope"
  - name: "area:runtime-worker"
    color: "0052cc"
    description: "runtime/crates/worker scope"
  - name: "area:runtime-shared"
    color: "0e8a16"
    description: "runtime/crates/shared scope"
  - name: "area:runtime-frontend"
    color: "fbca04"
    description: "runtime/frontend asset and styling scope"
  - name: "area:payment-crypto"
    color: "f9d0c4"
    description: "runtime/cloudrun/payment-crypto scope"
  - name: "area:docs"
    color: "c5def5"
    description: "docs, process policy, or changelog scope"
  - name: "area:ci-cd"
    color: "7057ff"
    description: "GitHub Actions CI/CD workflow scope"
  - name: "area:infra"
    color: "bfd4f2"
    description: "Deployment and infrastructure automation scope"
  - name: "area:auth"
    color: "e99695"
    description: "Auth, passkey, session, or identity scope"
  - name: "area:observability"
    color: "d4c5f9"
    description: "Metrics, logging, tracing, and incident telemetry scope"

  - name: "priority:p0"
    color: "b60205"
    description: "Urgent: service-impacting or release-blocking"
  - name: "priority:p1"
    color: "d93f0b"
    description: "High priority"
  - name: "priority:p2"
    color: "fbca04"
    description: "Medium priority"
  - name: "priority:p3"
    color: "0e8a16"
    description: "Low priority"

  - name: "status:triage"
    color: "ededed"
    description: "New intake, awaiting prioritization"
  - name: "status:ready"
    color: "c2e0c6"
    description: "Ready for implementation"
  - name: "status:in-progress"
    color: "fef2c0"
    description: "Implementation is active"
  - name: "status:review"
    color: "c5def5"
    description: "In active review"
  - name: "status:blocked"
    color: "f9d0c4"
    description: "Blocked by dependency or decision"
  - name: "status:done"
    color: "0e8a16"
    description: "Completed and merged"

  - name: "risk:low"
    color: "c2e0c6"
    description: "Low operational risk"
  - name: "risk:medium"
    color: "fbca04"
    description: "Moderate operational risk"
  - name: "risk:high"
    color: "b60205"
    description: "High operational/security/production risk"
