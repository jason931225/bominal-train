<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bominal Evervault Tester</title>
    <link rel="stylesheet" href="/evervault-test/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>bominal Evervault Mini Tester</h1>
        <p class="subtitle">Encrypt mock PAN in browser and verify Relay decryption at listener.</p>

        <div class="row">
          <label for="mock-pan">Mock Card Number</label>
          <input id="mock-pan" type="text" placeholder="4111 1111 1111 1111" autocomplete="off" />
        </div>

        <div class="row">
          <label>Mock SRT Payment Inputs (encrypted in browser)</label>
          <div class="grid-two">
            <input id="srt-card-number" type="text" placeholder="Card Number" autocomplete="off" />
            <input id="srt-card-cvc" type="text" placeholder="CVC" autocomplete="off" />
            <input id="srt-card-expiry-month" type="text" placeholder="Expiry Month (MM)" autocomplete="off" />
            <input id="srt-card-expiry-year" type="text" placeholder="Expiry Year (YY or YYYY)" autocomplete="off" />
            <input id="srt-amount" type="text" placeholder="Amount" value="1300" autocomplete="off" />
            <input id="srt-currency" type="text" placeholder="Currency" value="TWD" autocomplete="off" />
            <input id="srt-booking-reference" type="text" placeholder="Booking Reference" value="SRT-ORDER-0001" autocomplete="off" />
          </div>
        </div>

        <div class="row">
          <label>Evervault UI Card</label>
          <div id="ev-card-fields" class="ev-card-host" aria-label="Evervault UI Card"></div>
          <p id="ev-card-state" class="helper">Initializing UI Card...</p>
        </div>

        <div class="actions">
          <button id="self-check-btn" type="button">Self Check</button>
          <button id="run-test-btn" type="button">Run Encrypt + Relay Test</button>
          <button id="run-card-test-btn" type="button">Run UI Card + Relay Test</button>
          <button id="run-srt-go-test-btn" type="button">Run SRT Payload + Go SDK Relay Test</button>
        </div>

        <p id="status-line" class="status">Idle (auto-updates while polling; no page refresh needed)</p>

        <pre id="result-json" class="result" aria-live="polite">No result yet.</pre>
      </section>
    </main>

    <script type="module" src="/evervault-test/app.js"></script>
  </body>
</html>
